<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Twordle</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#121213;--border:#3a3a3c;--correct:#538d4e;--present:#b59f3b;
      --absent:#3a3a3c;--key:#818384;--text:#fff;--muted:#818384;--tile:62px;
    }
    html{overflow:hidden;height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;
         height:100%;overflow:hidden;overscroll-behavior:none;
         display:flex;flex-direction:column;align-items:center;}
    #app{display:flex;flex-direction:column;align-items:center;width:100%;flex:1;min-height:0;}
    .screen{display:flex;width:100%;max-width:500px;flex-direction:column;align-items:center;
            animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* header */
    /* shared top bar (every screen except login & home) */
    .topbar{width:100%;display:flex;align-items:center;justify-content:center;
            border-bottom:1px solid var(--border);padding:10px 16px;position:relative;flex-shrink:0;}
    .topbar h1{font-size:1.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
    .tb-center{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .tb-menu{position:absolute;left:14px;background:none;border:none;color:var(--muted);
             font-size:.8rem;letter-spacing:.05em;cursor:pointer;padding:6px 8px;touch-action:manipulation;
             display:flex;align-items:center;gap:4px;transition:color .2s;}
    .tb-menu:hover{color:var(--text);}
    .tb-right{position:absolute;right:16px;display:flex;align-items:center;gap:6px;}
    .tb-meta{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .tb-new-btn{background:none;border:1px solid var(--border);color:var(--muted);
                font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;touch-action:manipulation;
                padding:6px 10px;border-radius:4px;cursor:pointer;transition:color .2s,border-color .2s;}
    .tb-new-btn:hover{color:var(--text);border-color:var(--text);}
    .badge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
           background:#1e1e1f;border:1px solid var(--border);padding:3px 10px;border-radius:20px;}

    /* buttons */
    .btn{width:100%;max-width:300px;padding:14px 24px;border-radius:6px;border:none;touch-action:manipulation;
         font-size:.9rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
         cursor:pointer;transition:filter .15s,transform .1s;}
    .btn:active{filter:brightness(.85);transform:scale(.98);}
    .btn-g{background:var(--correct);color:#fff;}
    .btn-o{background:none;border:1px solid var(--border);color:var(--text);}
    .btn-o:hover{border-color:var(--text);}
    .btn-y{background:var(--present);color:#fff;}

    /* inputs */
    .tinput{background:none;border:2px solid var(--border);color:var(--text);
            font-size:1rem;font-weight:600;padding:10px 14px;border-radius:6px;
            outline:none;transition:border-color .15s;width:100%;}
    .tinput:focus{border-color:#818384;}
    .tinput::placeholder{color:#3a3a3c;}
    .err{color:#e57373;font-size:.78rem;letter-spacing:.03em;min-height:18px;}

    /* Login */
    #s-login{min-height:100vh;justify-content:center;}
    .login-body{flex:1;display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:20px;padding:40px 32px;text-align:center;width:100%;}
    .login-logo{font-size:3rem;font-weight:800;letter-spacing:.15em;margin-bottom:8px;}
    .login-sub{color:var(--muted);font-size:.82rem;letter-spacing:.04em;margin-bottom:8px;}
    .login-eye-wrap{position:relative;width:100%;max-width:300px;}
    #login-input{letter-spacing:.05em;text-align:center;font-size:1rem;padding-right:44px;}
    #login-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);
               background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
    #login-eye:hover{color:var(--text);}
    #login-err{color:#e57373;font-size:.8rem;min-height:18px;}
    #login-btn{width:100%;max-width:300px;}

    /* Home */
    #s-home{min-height:100vh;}
    .home-body{flex:1;display:flex;flex-direction:column;align-items:center;
               justify-content:center;gap:14px;padding:40px 32px;text-align:center;width:100%;}
    .logo{font-size:3rem;font-weight:800;letter-spacing:.15em;margin-bottom:4px;}
    .sub{color:var(--muted);font-size:.85rem;letter-spacing:.04em;margin-bottom:20px;}
    #logout-btn{background:none;border:none;color:var(--muted);font-size:.75rem;
                letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
                text-decoration:underline;text-underline-offset:3px;margin-top:8px;}
    #logout-btn:hover{color:var(--text);}

    /* Disclaimer footer (login + home). Pushed to the bottom by the flex:1
       body above it; on screens whose content overflows the viewport it
       scrolls into view at the end of the scroll. */
    .disclaimer{font-size:.62rem;color:var(--muted);line-height:1.65;
                text-align:center;max-width:340px;padding:16px 24px 24px;
                opacity:.72;}

    /* Active games list */
    .active-games{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px;
                  margin-top:24px;}
    .ag-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
              text-align:center;margin-bottom:4px;}
    .ag-row{display:flex;align-items:stretch;gap:6px;}
    .ag-resume{flex:1;background:none;border:1px solid var(--border);border-radius:6px;
               color:var(--text);padding:10px 12px;cursor:pointer;text-align:left;
               display:flex;align-items:center;gap:10px;touch-action:manipulation;
               transition:border-color .15s,background .15s;font-family:inherit;}
    .ag-resume:hover{border-color:#565758;background:#1a1a1b;}
    .ag-icon{font-size:1.2rem;flex-shrink:0;}
    .ag-text{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
    .ag-title{font-size:.85rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .ag-status{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
               overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .ag-status.mine{color:var(--correct);}
    .ag-dismiss{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);
                width:36px;cursor:pointer;font-size:1.1rem;touch-action:manipulation;
                transition:color .15s,border-color .15s;font-family:inherit;}
    .ag-dismiss:hover{color:#e57373;border-color:#e57373;}

    /* Setup */
    #s-setup{min-height:100vh;}
    .setup-body{flex:1;display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:18px;padding:40px 32px;width:100%;}
    .setup-body h2{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .field{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px;}
    .field label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

    /* Word entry */
    #s-word-entry{min-height:100vh;}
    .we-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:18px;padding:32px 24px;text-align:center;width:100%;}
    .we-prompt{font-size:.9rem;color:var(--muted);line-height:1.6;}
    .we-prompt strong{color:var(--text);}
    .we-fields{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
    .we-row{display:flex;flex-direction:column;gap:4px;}
    .we-row label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;}
    .wrap-eye{position:relative;}
    .word-w-input{font-size:1.3rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
                  text-align:center;padding:11px 40px 11px 12px;}
    /* Mask the entered word ourselves with a dot-overlay instead of using
       type="password" (which would trigger password-manager prompts) or
       -webkit-text-security: disc (which on iOS Safari briefly reveals the
       last typed character — Apple's "show last char" carry-over from
       password fields). Hiding the input text via `color: transparent` and
       rendering dots in an overlay div eliminates both problems while
       keeping a visible caret so the user can see where they're typing. */
    .word-w-input.masked{color:transparent;caret-color:var(--text);}
    .word-input-mask{position:absolute;inset:0;pointer-events:none;
                     padding:11px 40px 11px 12px;
                     font-size:1.3rem;font-weight:700;letter-spacing:.25em;
                     display:flex;align-items:center;justify-content:center;
                     color:var(--text);}
    .eye-btn{position:absolute;right:9px;top:50%;transform:translateY(-50%);
             background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;}
    .eye-btn:hover{color:var(--text);}
    .we-row-err{color:#e57373;font-size:.75rem;text-align:left;min-height:16px;}

    /* Handoff / Share */
    #s-handoff,#s-share{min-height:100vh;justify-content:center;}
    .ho-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .ho-icon{font-size:3rem;}
    .ho-body h2{font-size:1.4rem;font-weight:700;}
    .ho-body p{color:var(--muted);line-height:1.7;font-size:.9rem;}
    .share-url{font-family:'SF Mono','Monaco','Courier New',monospace;font-size:.7rem;
               background:#1a1a1b;border:1px solid var(--border);border-radius:6px;
               padding:10px 12px;word-break:break-all;color:var(--muted);
               max-width:340px;width:100%;cursor:pointer;line-height:1.4;
               /* Clamp to 2 lines + ellipsis — the user doesn't actually read
                  the URL; the textbox is a "yep that's a link" preview that
                  also acts as a tap-to-copy target. */
               display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
               overflow:hidden;}
    .share-url:hover{color:var(--text);border-color:#565758;}
    .qr-box{width:240px;height:240px;background:#fff;border-radius:8px;padding:8px;
            display:flex;align-items:center;justify-content:center;}
    .qr-box svg{width:100%;height:100%;display:block;}
    .qr-toggle{background:none;border:none;color:var(--muted);font-size:.75rem;
               letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
               text-decoration:underline;text-underline-offset:3px;padding:4px 8px;
               touch-action:manipulation;}
    .qr-toggle:hover{color:var(--text);}

    /* Setup / accept-challenge / mode-chooser reuse setup-body + we-* styles */
    #s-accept-challenge,#s-mode-chooser{min-height:100vh;}
    .mc-hint{font-size:.78rem;color:var(--muted);line-height:1.5;
             max-width:300px;margin-top:-6px;text-align:center;}

    /* Screens whose content can grow taller than the viewport. The body has
       overflow:hidden (to lock the game screen in place), so each of these
       gets a bounded height + its own scroll container. `safe center` keeps
       short content vertically centered but pins the top to flex-start when
       content overflows, so the header is always visible AND any bottom-of-
       screen action button (Done, Continue, Play Again, etc.) is reachable
       via scroll. */
    #s-login,#s-setup,#s-mode-chooser,#s-accept-challenge,#s-word-entry,#s-home,
    #s-share,#s-handoff,#s-round-summary,#s-game-over,#s-solo-summary{
      height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .login-body,.setup-body,.we-body,.home-body,.ho-body,.rs-body,.go-body,.ss-body{
      justify-content:safe center;
    }

    /* Game */
    #s-game{min-height:100vh;}
    #game-main{flex:1;display:flex;flex-direction:column;align-items:center;
               justify-content:center;gap:28px;padding:20px 0 10px;position:relative;}
    #cont-overlay{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);z-index:10;}

    /* tiles */
    #board{display:grid;grid-template-rows:repeat(6,var(--tile));grid-template-columns:repeat(5,var(--tile));gap:5px;}
    .tile{width:var(--tile);height:var(--tile);border:2px solid var(--border);display:flex;align-items:center;
          justify-content:center;font-size:2rem;font-weight:700;text-transform:uppercase;
          color:var(--text);background:var(--bg);}
    .tile.filled{border-color:#565758;}
    .tile.pop{animation:pop .1s ease;}
    .tile.flip{animation:flip .3s ease forwards;}
    .tile.bnc{animation:bnc .6s ease forwards;}
    .row-shake{animation:shk .5s ease;}
    @keyframes pop {0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
    @keyframes bnc {0%{transform:translateY(0)}40%{transform:translateY(-28px)}65%{transform:translateY(-10px)}80%{transform:translateY(-18px)}90%{transform:translateY(-4px)}100%{transform:translateY(0)}}
    @keyframes shk {0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
    .tile[data-state="correct"]{background:var(--correct);border-color:var(--correct);}
    .tile[data-state="present"]{background:var(--present);border-color:var(--present);}
    .tile[data-state="absent"] {background:var(--absent); border-color:var(--absent);}

    /* keyboard */
    #keyboard{display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:20px;}
    .krow{display:flex;gap:6px;}
    .key{height:58px;min-width:43px;padding:0 6px;border-radius:4px;border:none;background:var(--key);touch-action:manipulation;
         color:var(--text);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;
         display:flex;align-items:center;justify-content:center;transition:background .15s;letter-spacing:.03em;}
    .key.wide{min-width:65px;font-size:.75rem;}
    .key:active{filter:brightness(.8);}
    .key[data-state="correct"]{background:var(--correct);color:#fff;}
    .key[data-state="present"]{background:var(--present);color:#fff;}
    .key[data-state="absent"] {background:var(--absent); color:#fff;}

    /* Round Summary */
    #s-round-summary{min-height:100vh;}
    .rs-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:24px;padding:32px 24px;text-align:center;width:100%;}
    .rs-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    .scoreboard{width:100%;max-width:340px;display:flex;flex-direction:column;gap:0;
                border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .sb-head{display:grid;grid-template-columns:1fr repeat(3,52px);background:#1a1a1b;
             padding:8px 14px;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .sb-row {display:grid;grid-template-columns:1fr repeat(3,52px);padding:10px 14px;
             border-top:1px solid var(--border);align-items:center;}
    .sb-name{font-weight:700;font-size:.95rem;text-align:left;}
    .sb-cell{text-align:center;font-size:.85rem;font-weight:600;}
    .sb-cell.ok {color:var(--correct);}
    .sb-cell.no {color:var(--muted);}
    .sb-cell.na {color:#3a3a3c;}
    .totals-row{display:flex;justify-content:center;gap:32px;font-size:.8rem;color:var(--muted);}
    .tot-item strong{color:var(--text);}
    .rs-verdict{font-size:.9rem;color:var(--muted);}

    /* Game Over */
    #s-game-over{min-height:100vh;justify-content:center;}
    .go-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .go-icon{font-size:3.5rem;}
    .go-body h2{font-size:2rem;font-weight:800;}
    .go-wname{color:var(--correct);}
    .go-sub{color:var(--muted);font-size:.85rem;line-height:1.6;}
    .go-detail{width:100%;max-width:320px;}
    .go-share{display:flex;flex-direction:column;align-items:center;gap:14px;
              width:100%;max-width:340px;padding-top:8px;
              border-top:1px solid var(--border);margin-top:6px;}
    .go-share-prompt{color:var(--muted);font-size:.9rem;line-height:1.6;text-align:center;}
    .go-share-prompt strong{color:var(--text);}

    /* Solo Summary */
    #s-solo-summary{min-height:100vh;justify-content:center;}
    .ss-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .ss-icon{font-size:3rem;}
    .ss-body h2{font-size:1.8rem;font-weight:800;}
    .ss-word{font-size:2.2rem;font-weight:800;letter-spacing:.3em;color:var(--correct);}
    .ss-word.miss{color:var(--muted);}
    .ss-sub{color:var(--muted);font-size:.9rem;line-height:1.6;}
    .ss-cta{background:none;border:none;color:var(--muted);font-size:.85rem;line-height:1.5;
            cursor:pointer;padding:4px 8px;font-family:inherit;text-align:center;touch-action:manipulation;
            transition:color .15s;}
    .ss-cta strong{color:var(--correct);font-weight:700;}
    .ss-cta:hover{color:var(--text);}
    .ss-cta:hover strong{filter:brightness(1.15);}
    .ss-actions{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}

    /* Toast */
    #toasts{position:fixed;top:70px;left:50%;transform:translateX(-50%);
            display:flex;flex-direction:column;align-items:center;gap:8px;z-index:100;pointer-events:none;}
    .toast{background:var(--text);color:var(--bg);padding:10px 18px;border-radius:6px;
           font-weight:700;font-size:.85rem;letter-spacing:.05em;animation:fadeIO 1.6s ease forwards;}
    @keyframes fadeIO{0%{opacity:0;transform:translateY(-6px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0}}

    /* Mobile */
    @media (max-width: 500px) {
      :root { --tile: clamp(44px, calc((100vw - 52px) / 5), 62px); }
      #board { gap: 4px; }
      #keyboard { padding: 0 2px 16px; width: 100%; box-sizing: border-box; }
      .krow { gap: 5px; width: 100%; }
      .key  { min-width: 0; flex: 1; height: 50px;
              font-size: .72rem; padding: 0 2px; letter-spacing: 0; }
      .key.wide { flex: 1.5; min-width: 0; font-size: .6rem; }
      #game-main  { gap: 16px; padding-top: 12px; }
      .topbar { padding: 8px 12px; }
      .topbar h1 { font-size: 1.4rem; }
      .tb-meta { font-size: .55rem; }
    }
    #s-game { min-height: 100dvh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toasts"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10.22.0';
    import { useReducer, useEffect, useState, useRef, useCallback, useMemo } from 'https://esm.sh/preact@10.22.0/hooks';
    import htm from 'https://esm.sh/htm@3.1.1';
    import qrcode from 'https://esm.sh/qrcode-generator@1.4.4';
    import LZString from 'https://esm.sh/lz-string@1.5.0';

    const html = htm.bind(h);

    // Build an SVG QR for a given URL. Single <path> with one M-h-v-h-z per
    // dark module — fast to render, sharp at any size, white background so
    // most camera scanners pick it up even on dark themes.
    function renderQRPath(url) {
      const qr = qrcode(0, 'M');  // type auto, error correction M (~15%)
      qr.addData(url);
      qr.make();
      const n = qr.getModuleCount();
      const margin = 2;
      let d = '';
      for (let row = 0; row < n; row++) {
        for (let col = 0; col < n; col++) {
          if (qr.isDark(row, col)) d += `M${col + margin} ${row + margin}h1v1h-1z`;
        }
      }

    // ── Auth ──────────────────────────────────────────────────────────────
    const AUTH_SALT = '2887189806cd0b6d11cfb3dab14548c1933e1205f23456f6bafeea6b52e5dbc0';

    const DAY_MS    = 24 * 60 * 60 * 1000;

    const AUTH_TTL_MS = 365 * DAY_MS;   // auth ages out after a year (refreshed on each session)

    // Wrap stored values with their save timestamp; on read, discard if older
    // than ttlMs. Returns { value } on hit, null on miss/expired/malformed.
    // Legacy unwrapped values are accepted once and get re-saved with a
    // wrapper on the next write.
    function readWithTTL(key, ttlMs) {
      try {
        const raw = localStorage.getItem(key);
        if (raw == null) return null;
        let parsed = null;
        try { parsed = JSON.parse(raw); } catch (e) { /* not JSON: legacy bare value */ }
        if (!parsed || typeof parsed !== 'object' || typeof parsed.savedAt !== 'number') {
          // Legacy format. Accept this once; next write will adopt the wrapper.
          return { value: parsed ?? raw };
        }
        if (Date.now() - parsed.savedAt > ttlMs) {
          localStorage.removeItem(key);
          return null;
        }
        return { value: parsed.value };
      } catch (e) {
        return null;
      }
    }

    function writeWithTTL(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify({ value, savedAt: Date.now() }));
      } catch (e) {}
    }

    function isAuthed() {
      const r = readWithTTL(AUTH_KEY, AUTH_TTL_MS);
      return !!r && r.value === AUTH_HASH;
    }
    function writeAuth() { writeWithTTL(AUTH_KEY, AUTH_HASH); }
    function clearAuth() { try { localStorage.removeItem(AUTH_KEY); } catch (e) {} }

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // ── Toast (DOM-side-effect, kept simple) ──────────────────────────────
    function toast(msg, dur = 1600) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      el.style.animationDuration = dur + 'ms';
      document.getElementById('toasts').appendChild(el);

    // ── Game scoring ──────────────────────────────────────────────────────
    function scoreGuess(guess, target) {
      const res = Array(COLS).fill('absent');
      const tgt = target.split('');
      const ga  = guess.split('');
      for (let i = 0; i < COLS; i++) {
        if (ga[i] === tgt[i]) { res[i] = 'correct'; tgt[i] = null; ga[i] = null; }
      }
      for (let i = 0; i < COLS; i++) {
        if (!ga[i]) continue;
        const x = tgt.indexOf(ga[i]);
        if (x !== -1) { res[i] = 'present'; tgt[x] = null; }
      }
      return res;
    }

    function randomTarget() {
      return ANSWERS[Math.floor(Math.random() * ANSWERS.length)].toUpperCase();
    }

    // ── Game model ────────────────────────────────────────────────────────
    // A *game* is the per-game domain state — the thing that gets encoded into
    // a URL hash for remote play AND stored as an entry in the on-disk games
    // dict. UI/transient state (current screen, handoff config, reveal flag)
    // lives OUTSIDE the game on the reducer state, so it doesn't get
    // serialized into share links or saved across reloads.
    //
    // mode: 's' solo · 'l' local 2-player · 'r' remote (Phase 2+)
    // The shape is the same across modes; unused slices stay at defaults.

    const GAME_VERSION = 1;

    function randomGameId() {
      // 6 base32 chars (~30 bits — collision-free for a personal app).
      // Alphabet skips lookalikes (0/o/O/1/l/I) for QR/typed contexts.
      const ALPHA = 'abcdefghijkmnpqrstuvwxyz23456789';
      const buf = new Uint8Array(6);
      crypto.getRandomValues(buf);
      let out = '';
      for (let i = 0; i < 6; i++) out += ALPHA[buf[i] & 31];
      return out;
    }

    const emptyGame = (overrides = {}) => ({
      id: '',
      mode: 's',
      players: ['', ''],
      challengeFor: [[], []],
      results: Array.from({length: TOTAL_ROUNDS}, () => [null, null]),
      round: 0,
      turn: 0,
      wordEntryPhase: 0,
      target: '',
      guesses: [],
      scores: [],
      current: '',
      over: false,
      won: false,
      // Remote-only (Phase 2). Undefined for local modes.
      turnFor: undefined,
      turnCounter: undefined,
      // Per-device, per-game identity: which player (0 or 1) I am in this
      // match. Stored in the disk wrapper, NOT in encodeGame (since each
      // device has its own perspective). Set on game creation/receive.
      myRole: undefined,
      ...overrides,
    });

    function newSoloGame() {
      return emptyGame({ id: randomGameId(), mode: 's', target: randomTarget() });
    }

    function newLocalGame(p1, p2) {
      return emptyGame({ id: randomGameId(), mode: 'l', players: [p1, p2] });
    }

    // Where should a freshly-loaded URL game land the receiver?
    // We assume the receiver IS the next player (turnFor) — Phase 2 punts on
    // divergence detection (older-link / wrong-recipient handling).
    function screenForReceivedGame(g) {
      if (!g) return 'home';
      if (g.over) return 'game-over';
      if (g.mode === 'r' && (!g.challengeFor[0] || g.challengeFor[0].length === 0)) {
        return 'accept-challenge';
      }
      // Round-summary handoff: both players just completed a round, eval was
      // "continue", state hasn't been advanced yet. The receiver sees the
      // scoreboard before playing the next round.
      if (g.mode === 'r' && isRemoteAtRoundSummary(g)) return 'round-summary';
      return 'game';
    }

    // True iff a remote game is paused at "round just completed, eval = continue,
    // not yet advanced to the next round." Both turn-results are recorded for
    // the current round but the round hasn't been advanced.
    function isRemoteAtRoundSummary(g) {
      if (g.mode !== 'r' || g.over) return false;
      if (g.round >= TOTAL_ROUNDS - 1) return false;  // last round → game-over, not round-summary
      const r = g.results[g.round];
      return !!(r && r[0] && r[1]);
    }

    function getCurrentGame(state) {
      return state.currentGameId ? state.games[state.currentGameId] : null;
    }

    // Update the current game via a partial object or an updater function.
    // Stamps _lastUpdate so the active-games list can sort by recency. The
    // underscore-prefixed field is in-memory only — encodeGame doesn't pick
    // it up (it builds `packed` from a fixed allow-list of keys).
    function withCurrentGame(state, update) {
      const id = state.currentGameId;
      if (!id) return state;
      const game = state.games[id];
      if (!game) return state;
      const next = typeof update === 'function' ? update(game) : { ...game, ...update };
      next._lastUpdate = Date.now();
      return { ...state, games: { ...state.games, [id]: next } };
    }

    function stampGame(game) { return { ...game, _lastUpdate: Date.now() }; }

    // Drop the current game from the dict if it's a "leaving leftover" —
    // finished local match / solo, a blank solo that was never played, or a
    // 2P placeholder where no words have been entered yet.
    //
    // Finished REMOTE games are KEPT when the sender hasn't shared the final
    // result yet (turnFor !== myRole means the URL is still pointed at the
    // other player). The active-games entry lets them re-open and re-share
    // later. Finished remote receivers are dropped — they've already seen the
    // result and there's nothing more for them to do.
    function dropLeavingCurrent(state) {
      const games = { ...state.games };
      const cur = getCurrentGame(state);
      if (!cur) return games;
      const finishedLocal = cur.over && (cur.mode === 's' || cur.mode === 'l');
      const finishedRemoteReceiver = cur.over && cur.mode === 'r'
        && cur.turnFor !== undefined && cur.myRole !== undefined
        && cur.turnFor === cur.myRole;
      const blankSolo = cur.mode === 's' && cur.guesses.length === 0 && !cur.over;
      const blankSetup = (cur.mode === 'l' || cur.mode === 'r')
        && (cur.challengeFor[0]?.length ?? 0) === 0
        && (cur.challengeFor[1]?.length ?? 0) === 0;
      if (finishedLocal || finishedRemoteReceiver || blankSolo || blankSetup) {
        delete games[cur.id];
      }
      return games;
    }

    // ── Game encoding (shared between URL hash and on-disk dict) ──────────
    // Compact JSON with short keys + single-char score codes, then run
    // through LZ-string compressToEncodedURIComponent — the output is both
    // compressed AND URL-component-safe (no further base64 step needed).
    //
    // Backward compatibility: decodeGame tries LZ-string first, falls back
    // to the legacy plain base64url format so URLs/saves from earlier
    // versions still decode. Phases 1–5 used `b64UrlEncode(JSON.stringify(p))`.
    function encodeGame(g) {
      const packed = {
        v: GAME_VERSION,
        id: g.id, m: g.mode,
        p: g.players,
        cf: g.challengeFor,
        rs: g.results,
        r: g.round, t: g.turn, wep: g.wordEntryPhase,
        tg: g.target,
        gs: g.guesses,
        sc: g.scores.map(row => row.map(s => s[0])),
        cu: g.current,
        ov: g.over, wn: g.won,
      };
      if (g.mode === 'r') { packed.for = g.turnFor; packed.tc = g.turnCounter; }
      return LZString.compressToEncodedURIComponent(JSON.stringify(packed));
    }

    function decodeGame(str) {
      const tryParse = (text) => {
        if (!text) return null;
        try {
          const p = JSON.parse(text);
          if (!p || p.v !== GAME_VERSION) return null;
          return p;
        } catch (e) { return null; }
      };
      const materialize = (p) => {
        const SCORE = { a: 'absent', p: 'present', c: 'correct' };
        return emptyGame({
          id: p.id, mode: p.m,
          players: p.p || ['', ''],
          challengeFor: p.cf || [[], []],
          results: p.rs || Array.from({length: TOTAL_ROUNDS}, () => [null, null]),
          round: p.r ?? 0, turn: p.t ?? 0, wordEntryPhase: p.wep ?? 0,
          target: p.tg || '',
          guesses: p.gs || [],
          scores: (p.sc || []).map(row => row.map(c => SCORE[c] || 'absent')),
          current: p.cu || '',
          over: !!p.ov, won: !!p.wn,
          turnFor: p.for, turnCounter: p.tc,
        });
      };
      // Try LZ-string (current format)
      let parsed = null;
      try {
        const text = LZString.decompressFromEncodedURIComponent(str);
        parsed = tryParse(text);
      } catch (e) { /* fall through */ }
      // Fall back to legacy base64url (Phase 1–5 format)
      if (!parsed) {
        try {
          parsed = tryParse(b64UrlDecode(str));
        } catch (e) { /* fall through */ }
      }
      return parsed ? materialize(parsed) : null;
    }

    function b64UrlEncode(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = '';
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function b64UrlDecode(str) {
      let s = str.replace(/-/g, '+').replace(/_/g, '/');
      const pad = s.length % 4;
      if (pad) s += '='.repeat(4 - pad);
      const bin = atob(s);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    // ── URL share helpers ─────────────────────────────────────────────────
    // Share URL format: <origin><path>#r:<encodedGame>
    // The 'r:' prefix is a marker so other future hashes (deep links, etc.)
    // can coexist. Hash, not query, keeps state client-side (no Pages roundtrip).
    const URL_PREFIX = 'r:';

    function parseUrlGame() {
      const h = location.hash || '';
      if (!h.startsWith('#' + URL_PREFIX)) return null;
      return decodeGame(h.slice(1 + URL_PREFIX.length));
    }

    function buildShareUrl(game) {
      const base = location.origin + location.pathname;
      return base + '#' + URL_PREFIX + encodeGame(game);
    }

    function clearUrlHash() {
      try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}
    }

    // ── Reducer ───────────────────────────────────────────────────────────

    const initialState = {
      screen: 'home',
      currentGameId: null,         // pointer into `games`
      games: {},                    // { [gameId]: game }
      // Transient UI state — NOT encoded, NOT persisted across reload
      handoff: null,
      pendingContinue: false,
      revealing: false,
      ui: { errorTick: 0, errorMsg: '' },
    };

    function reducer(state, action) {
      switch (action.type) {
        case 'RESET':
          return { ...initialState };

        case 'PICK_SOLO': {
          const game = newSoloGame();
          const games = dropLeavingCurrent(state);
          return { ...state, screen: 'game', currentGameId: game.id,
                   games: { ...games, [game.id]: stampGame(game) },
                   handoff: null, pendingContinue: false, revealing: false };
        }

        case 'NEW_SOLO_GAME': {
          // Replace the current solo game with a fresh one — drop the prior id
          // so finished/abandoned solos don't accumulate in the dict.
          const game = newSoloGame();
          const games = { ...state.games };
          if (state.currentGameId) delete games[state.currentGameId];
          return { ...state, screen: 'game', currentGameId: game.id,
                   games: { ...games, [game.id]: game },
                   handoff: null, pendingContinue: false, revealing: false };
        }

        case 'PICK_TWO_PLAYER':
          return { ...state, screen: 'setup',
                   games: dropLeavingCurrent(state),
                   currentGameId: null };

        case 'REMOTE_ACCEPT_DONE': {
          // Opponent (P2) just entered their 3 words. Both players' words are
          // now locked in. Advance the game state to P1's R1 so the URL that
          // gets shared back encodes "P1's turn now, here's your target."
          const g = getCurrentGame(state);
          if (!g) return state;
          const challengeFor = g.challengeFor.map(arr => arr.slice());
          challengeFor[0] = action.words.slice();
          return withCurrentGame({ ...state, screen: 'share' }, {
            challengeFor,
            wordEntryPhase: 1,
            round: 0, turn: 0,
            target: challengeFor[0][0],
            guesses: [], scores: [], current: '',
            over: false, won: false,
            turnFor: 0,
            turnCounter: (g.turnCounter || 1) + 1,
          });
        }

        case 'RESUME_GAME': {
          // Tap a game in the active-games list. Pick the right screen for
          // where the user left off, based on the game's current state.
          const id = action.gameId;
          const game = state.games[id];
          if (!game) return state;
          let screen = 'game';
          if (game.over) {
            screen = game.mode === 's' ? 'solo-summary' : 'game-over';
          } else if (game.mode === 'l') {
            // Local 2P. If either player's words aren't entered yet, resume
            // at the word-entry step (placeholders from mode-chooser bail-out
            // would otherwise route to a broken game screen).
            if (game.challengeFor[0].length === 0 || game.challengeFor[1].length === 0) {
              screen = 'word-entry';
            } else {
              screen = 'game';
            }
          } else if (game.mode === 'r') {
            const myRole = game.myRole;
            if (game.challengeFor[0].length === 0 && myRole === 1) {
              screen = 'accept-challenge';
            } else if (game.challengeFor[1].length === 0 && myRole === 0) {
              // Initiator's setup never finished — resume at their word entry.
              screen = 'word-entry';
            } else if (isRemoteAtRoundSummary(game)) {
              screen = 'round-summary';
            } else if (game.turnFor === myRole) {
              screen = 'game';        // my turn to play
            } else {
              screen = 'share';       // re-show share URL (waiting on opponent)
            }
          }
          return {
            ...state,
            currentGameId: id,
            screen,
            handoff: null, pendingContinue: false, revealing: false,
          };
        }

        case 'DISMISS_GAME': {
          const id = action.gameId;
          if (!state.games[id]) return state;
          const games = { ...state.games };
          delete games[id];
          const currentGameId = state.currentGameId === id ? null : state.currentGameId;
          return { ...state, games, currentGameId };
        }

        case 'LOAD_FROM_URL': {
          // Phase 2 punts on divergence: incoming state always overwrites.
          // The receiver is assumed to be turnFor (the recipient of the share).
          // For a brand-new gameId on this device, our role is whoever the
          // URL's turnFor points at. If we already have this game (we sent
          // and got the reply back), preserve our existing myRole.
          const incoming = action.game;
          if (!incoming || !incoming.id) return state;
          const existing = state.games[incoming.id];
          const myRole = existing && existing.myRole !== undefined
            ? existing.myRole
            : incoming.turnFor;
          const merged = { ...incoming, myRole };
          return {
            ...state,
            screen: screenForReceivedGame(merged),
            currentGameId: incoming.id,
            games: { ...state.games, [incoming.id]: stampGame(merged) },
            handoff: null, pendingContinue: false, revealing: false,
          };
        }

        case 'GO_HOME':
          // Drop the current pointer + transient UI; drop the current game
          // entirely if it's a leaving leftover (finished, blank solo,
          // or blank 2P setup placeholder).
          return { ...initialState, games: dropLeavingCurrent(state) };

        case 'SETUP_DONE': {
          // Names submitted. Create the game with mode='l' as a placeholder;
          // the mode-chooser screen commits the actual mode next. wordEntryPhase
          // starts at 0 = initiator (P1) sets their words for P2 first.
          const game = newLocalGame(action.p1, action.p2);
          return { ...state, screen: 'mode-chooser', currentGameId: game.id,
                   games: { ...state.games, [game.id]: stampGame(game) },
                   handoff: null, pendingContinue: false, revealing: false };
        }

        case 'PICK_PASS_AND_PLAY':
          // Mode is already 'l' from SETUP_DONE — just continue to word entry.
          return { ...state, screen: 'word-entry' };

        case 'PICK_REMOTE_VARIANT': {
          // Switch the placeholder game to remote mode; initiator is P1 (role 0),
          // opponent receives the URL after P1's words are entered.
          const g = getCurrentGame(state);
          if (!g) return state;
          return withCurrentGame({ ...state, screen: 'word-entry' }, {
            mode: 'r', myRole: 0,
            turnFor: 1, turnCounter: 1,
          });
        }

        case 'WORD_ENTRY_DONE': {
          const g = getCurrentGame(state);
          if (!g) return state;
          // New phase semantics:
          //   phase 0 = initiator (P1) sets words for P2 → challengeFor[1]
          //   phase 1 = opponent  (P2) sets words for P1 → challengeFor[0]
          // (Inverted from the old numbering, which had P2 going first in
          // pass-and-play. Both modes now have the initiator set up first.)
          const phase = g.wordEntryPhase;
          const guesserIdx = 1 - phase;
          const challengeFor = g.challengeFor.map(arr => arr.slice());
          challengeFor[guesserIdx] = action.words;

          if (phase === 0) {
            // P1 just finished. Where to next depends on mode.
            if (g.mode === 'r') {
              // Remote: opponent will enter their words on their own device
              // after they open the share URL.
              return withCurrentGame({ ...state, screen: 'share' }, {
                challengeFor, wordEntryPhase: 1,
                turnFor: 1, turnCounter: (g.turnCounter || 1),
              });
            }
            // Local 2P: hand the device to P2 for their word entry.
            return withCurrentGame({
              ...state, screen: 'handoff',
              handoff: {
                badge: `${g.players[1]}'s setup`,
                icon: '🔒',
                title: 'Words locked in!',
                desc: `Now hand the device to <strong>${g.players[1]}</strong> to enter their words.`,
                btnText: 'Enter My Words →',
                next: { type: 'GO_WORD_ENTRY' },
              },
            }, { challengeFor, wordEntryPhase: 1 });
          }
          // phase === 1: P2 just finished. Both done → hand back to P1 for R1.
          // (Local 2P path only — in remote, P2's word entry happens via
          // AcceptChallenge → REMOTE_ACCEPT_DONE.)
          return withCurrentGame({
            ...state, screen: 'handoff',
            handoff: {
              badge: 'Round 1 of 3',
              icon: '🎯',
              title: "All words set — let's play!",
              desc: `Hand the device to <strong>${g.players[0]}</strong> to start Round 1.`,
              btnText: 'Start Round 1 →',
              next: { type: 'START_TURN', round: 0, player: 0 },
            },
          }, { challengeFor });
        }

        case 'GO_WORD_ENTRY':
          return { ...state, screen: 'word-entry', handoff: null };

        case 'START_TURN': {
          const g = getCurrentGame(state);
          if (!g) return state;
          const target = g.challengeFor[action.player][action.round];
          return withCurrentGame({
            ...state, screen: 'game',
            handoff: null, pendingContinue: false, revealing: false,
          }, {
            round: action.round, turn: action.player,
            target, guesses: [], scores: [], current: '',
            over: false, won: false,
          });
        }

        case 'TYPE_LETTER': {
          const g = getCurrentGame(state);
          if (!g || g.over || state.revealing) return state;
          if (g.current.length >= COLS) return state;
          return withCurrentGame(state, { current: g.current + action.letter });
        }

        case 'DELETE_LETTER': {
          const g = getCurrentGame(state);
          if (!g || g.over || state.revealing) return state;
          if (!g.current) return state;
          return withCurrentGame(state, { current: g.current.slice(0, -1) });
        }

        case 'SUBMIT_GUESS': {
          // Reducer validates and scores so we never lose the latest `current`
          // to a stale component closure (rapid key events batch before re-render).
          const g = getCurrentGame(state);
          if (!g || g.over || state.revealing) return state;
          if (g.current.length < COLS) {
            return { ...state, ui: { errorTick: state.ui.errorTick + 1, errorMsg: 'Not enough letters' } };
          }
          if (!ALL_VALID.has(g.current.toLowerCase())) {
            return { ...state, ui: { errorTick: state.ui.errorTick + 1, errorMsg: 'Not in word list' } };
          }
          const score = scoreGuess(g.current, g.target);
          return withCurrentGame({ ...state, revealing: true }, {
            guesses: [...g.guesses, g.current],
            scores: [...g.scores, score],
            current: '',
          });
        }

        case 'REVEAL_DONE': {
          // Called by Game after the reveal animation (+ any win/lose toast
          // delay) completes. Decides game-end and where to navigate next.
          const g = getCurrentGame(state);
          if (!g) return state;
          const lastScore = g.scores[g.scores.length - 1];
          const won = !!lastScore && lastScore.every(s => s === 'correct');
          const lost = !won && g.guesses.length >= ROWS;
          const ended = won || lost;
          if (!ended) return { ...state, revealing: false };
          if (g.mode === 's') {
            return withCurrentGame({ ...state, revealing: false, screen: 'solo-summary' },
                                   { over: true, won });
          }
          const results = g.results.map(r => r.slice());
          results[g.round][g.turn] = { solved: won, guesses: g.guesses.length };
          if (g.mode === 'l') {
            // Local 2P: show continue overlay so the device gets passed.
            return withCurrentGame({ ...state, revealing: false, pendingContinue: true },
                                   { over: true, won, results });
          }
          // Remote 2P: compute the next state then pick a screen.
          //   - Game over → land on game-over (the share affordance lives there
          //     now, so the player sees the result AND the prompt to send it).
          //   - Round eval = continue → round-summary (scoreboard).
          //   - Otherwise → share (mid-match URL hand-off).
          const remoteUpdates = advanceRemoteAfterTurn(g, results, won);
          const candidate = { ...g, ...remoteUpdates };
          const nextScreen = candidate.over
            ? 'game-over'
            : (isRemoteAtRoundSummary(candidate) ? 'round-summary' : 'share');
          return withCurrentGame({ ...state, revealing: false, screen: nextScreen },
                                 remoteUpdates);
        }

        case 'CONTINUE_FROM_TURN': {
          // 2-player: turn 0 → handoff for turn 1; turn 1 → evaluate round
          const g = getCurrentGame(state);
          if (!g) return state;
          if (g.turn === 0) {
            const rn = g.round + 1;
            return {
              ...state, pendingContinue: false, screen: 'handoff',
              handoff: {
                badge: `Round ${rn} of ${TOTAL_ROUNDS}`,
                icon: '🎯',
                title: `${g.players[1]}'s turn`,
                desc: `Hand the device to <strong>${g.players[1]}</strong>.<br>Press Start when they're ready.`,
                btnText: 'Start Puzzle',
                next: { type: 'START_TURN', round: g.round, player: 1 },
              },
            };
          }
          return evalRound({ ...state, pendingContinue: false }, g.round);
        }

        case 'REMOTE_ADVANCE_NEXT_ROUND': {
          // Receiver tapped Continue on the round-summary screen. Advance
          // the game to "my turn for the next round" and land on the game.
          const g = getCurrentGame(state);
          if (!g || g.mode !== 'r' || !isRemoteAtRoundSummary(g)) return state;
          const nextRound = g.round + 1;
          return withCurrentGame({ ...state, screen: 'game' }, {
            round: nextRound, turn: 0,
            target: g.challengeFor[0][nextRound],
            guesses: [], scores: [], current: '',
            over: false, won: false,
            turnFor: 0,
          });
        }

        case 'GOTO_SHARE':
          return { ...state, screen: 'share' };

        case 'NEXT_ROUND_HANDOFF': {
          const g = getCurrentGame(state);
          if (!g) return state;
          const nextRound = action.nextRound;
          return {
            ...state, screen: 'handoff',
            handoff: {
              badge: `Round ${nextRound + 1} of ${TOTAL_ROUNDS}`,
              icon: '🎯',
              title: `Round ${nextRound + 1} — ${g.players[0]}'s turn`,
              desc: `Hand the device to <strong>${g.players[0]}</strong>.<br>Press Start when they're ready.`,
              btnText: `Start Round ${nextRound + 1}`,
              next: { type: 'START_TURN', round: nextRound, player: 0 },
            },
          };
        }

        default:
          return state;
      }
    }

    function evalRound(state, roundIdx) {
      const g = getCurrentGame(state);
      if (!g) return state;
      const r0 = g.results[roundIdx][0];
      const r1 = g.results[roundIdx][1];
      // Asymmetric stumping → instant game over; otherwise last round → totals
      // game over; otherwise → round summary. The display type is computed
      // from the game data in the GameOver component (no separate state slice).
      if (r0.solved !== r1.solved) return { ...state, screen: 'game-over' };
      if (roundIdx === TOTAL_ROUNDS - 1) return { ...state, screen: 'game-over' };
      return { ...state, screen: 'round-summary' };
    }

    // After a remote-mode turn completes, compute the game-state updates
    // that position the URL recipient at exactly the right next step:
    //   - If P1 just played → swap to P2's turn for the same round
    //   - If P2 just played and round eval = continue → leave the state at
    //     "round just completed" so BOTH players see the round-summary
    //     scoreboard. The receiver advances to the next round on tap.
    //   - If P2 just played and game should end (asymmetric stump OR last
    //     round) → mark over and record the winning side
    function advanceRemoteAfterTurn(g, results, justWon) {
      const counter = (g.turnCounter || 0) + 1;
      if (g.turn === 0) {
        return {
          results, turn: 1, round: g.round,
          target: g.challengeFor[1][g.round],
          guesses: [], scores: [], current: '',
          over: false, won: false,
          turnFor: 1, turnCounter: counter,
        };
      }
      // turn === 1: both players played this round
      const r0 = results[g.round][0];
      const r1 = results[g.round][1];
      const asymmetric = r0.solved !== r1.solved;
      const lastRound = g.round === TOTAL_ROUNDS - 1;
      if (asymmetric || lastRound) {
        return {
          results,
          over: true, won: justWon,
          turnFor: 0, turnCounter: counter,
        };
      }
      // Continue: keep state at the round-summary handoff. The receiver
      // taps "Continue to Round N+1" to advance — that's REMOTE_ADVANCE_NEXT_ROUND.
      return {
        results,
        turnFor: 1 - g.turn,
        turnCounter: counter,
      };
    }

    // Display helpers — derived view from the current game.
    function gameOverDetails(g) {
      const roundsPlayed = g.round + 1;
      const last = g.results[g.round];
      if (last[0].solved !== last[1].solved) {
        return { type: 'stump', winnerIdx: last[0].solved ? 0 : 1, roundsPlayed };
      }
      const t0 = g.results.reduce((s, r) => s + r[0].guesses, 0);
      const t1 = g.results.reduce((s, r) => s + r[1].guesses, 0);
      if (t0 < t1) return { type: 'guesses', winnerIdx: 0, roundsPlayed, t0, t1 };
      if (t1 < t0) return { type: 'guesses', winnerIdx: 1, roundsPlayed, t0, t1 };
      return { type: 'tie', winnerIdx: -1, roundsPlayed, t0, t1 };
    }

    // ── Persistence ──────────────────────────────────────────────────────
    // Two storage keys:
    //   GAMES_KEY: { [gameId]: { value: <encoded>, savedAt } } — the games
    //   META_KEY:  { value: { currentGameId, screen }, savedAt } — the pointer
    // Each game ages out independently via SAVE_TTL_MS; the meta entry uses
    // the same TTL so a stale pointer to an expired game doesn't linger.

    const TRANSIENT_SCREENS = new Set(['setup', 'mode-chooser', 'word-entry', 'handoff']);

    function loadGames() {
      try {
        const raw = localStorage.getItem(GAMES_KEY);
        if (!raw) return {};
        const dict = JSON.parse(raw);
        if (!dict || typeof dict !== 'object') return {};
        const out = {};
        let changed = false;
        const now = Date.now();
        for (const [gameId, entry] of Object.entries(dict)) {
          if (!entry || typeof entry !== 'object' || typeof entry.savedAt !== 'number') {
            changed = true; continue;
          }
          if (now - entry.savedAt > SAVE_TTL_MS) { changed = true; continue; }
          const game = decodeGame(entry.value);
          if (!game) { changed = true; continue; }
          // myRole is per-device metadata stored in the wrapper, not in the
          // encoded game (the URL doesn't carry it — each device has its own).
          if (entry.myRole === 0 || entry.myRole === 1) game.myRole = entry.myRole;
          // Seed sort timestamp from the wrapper's savedAt.
          game._lastUpdate = entry.savedAt;
          out[gameId] = game;
        }
        if (changed) writeGames(out);
        return out;
      } catch (e) {
        return {};
      }
    }

    function writeGames(games) {
      try {
        const now = Date.now();
        const dict = {};
        for (const [gameId, game] of Object.entries(games)) {
          const entry = { value: encodeGame(game), savedAt: now };
          if (game.myRole === 0 || game.myRole === 1) entry.myRole = game.myRole;
          dict[gameId] = entry;
        }
        if (Object.keys(dict).length === 0) {
          localStorage.removeItem(GAMES_KEY);
        } else {
          localStorage.setItem(GAMES_KEY, JSON.stringify(dict));
        }
      } catch (e) {}
    }

    function loadMeta() {
      const r = readWithTTL(META_KEY, SAVE_TTL_MS);
      return r ? r.value : null;
    }

    function writeMeta(meta) { writeWithTTL(META_KEY, meta); }
    function clearMeta() { try { localStorage.removeItem(META_KEY); } catch (e) {} }
    function clearSaves() {
      try {
        localStorage.removeItem(GAMES_KEY);
        localStorage.removeItem(META_KEY);
        localStorage.removeItem(LEGACY_SAVE_KEY);
      } catch (e) {}
    }

    // One-time migration: collapse the old single-state _tw_save_v2 into a
    // single entry in the new games dict.
    function migrateLegacy() {
      try {
        const raw = localStorage.getItem(LEGACY_SAVE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        const old = (parsed && typeof parsed === 'object' && 'value' in parsed && 'savedAt' in parsed)
          ? parsed.value : parsed;
        localStorage.removeItem(LEGACY_SAVE_KEY);
        if (!old || !old.mode) return;
        const game = emptyGame({
          id: randomGameId(),
          mode: old.mode === 'solo' ? 's' : 'l',
          players: old.tp?.players || ['', ''],
          challengeFor: old.tp?.challengeFor || [[], []],
          results: old.tp?.results || Array.from({length: TOTAL_ROUNDS}, () => [null, null]),
          round: old.tp?.round ?? 0,
          turn: old.tp?.turn ?? 0,
          wordEntryPhase: old.tp?.wordEntryPhase ?? 0,
          target: old.game?.target || '',
          guesses: old.game?.guesses || [],
          scores: old.game?.scores || [],
          current: old.game?.current || '',
          over: !!old.game?.over, won: !!old.game?.won,
        });
        const games = loadGames();
        games[game.id] = game;
        writeGames(games);
        const screen = TRANSIENT_SCREENS.has(old.screen) ? 'home' : (old.screen || 'home');
        if (screen !== 'home') {
          writeMeta({ currentGameId: game.id, screen });
        }
      } catch (e) {
        try { localStorage.removeItem(LEGACY_SAVE_KEY); } catch (e2) {}
      }
    }

    function loadInitialState() {
      migrateLegacy();
      const games = loadGames();
      const meta = loadMeta();
      let currentGameId = null;
      let screen = 'home';
      if (meta && meta.currentGameId && games[meta.currentGameId]) {
        currentGameId = meta.currentGameId;
        screen = TRANSIENT_SCREENS.has(meta.screen) ? 'home' : (meta.screen || 'home');
      }
      return recoverEndState({ ...initialState, games, currentGameId, screen });
    }

    // If the user reloaded between SUBMIT_GUESS and REVEAL_DONE, the saved
    // game has the final guess committed but `over` is false — REVEAL_DONE
    // never fired so we'd be stuck on the game screen with no continue.
    // Synthesize the same transition REVEAL_DONE would have made.
    function recoverEndState(state) {
      if (state.screen !== 'game') return state;
      const g = getCurrentGame(state);
      if (!g || g.over || g.guesses.length === 0) return state;
      const lastScore = g.scores[g.scores.length - 1];
      const won = !!lastScore && lastScore.every(s => s === 'correct');
      const lost = !won && g.guesses.length >= ROWS;
      if (!won && !lost) return state;
      const updates = { over: true, won };
      if (g.mode === 's') {
        return withCurrentGame({ ...state, screen: 'solo-summary' }, updates);
      }
      const results = g.results.map(r => r.slice());
      if (!results[g.round][g.turn]) {
        results[g.round][g.turn] = { solved: won, guesses: g.guesses.length };
      }
      updates.results = results;
      return withCurrentGame({ ...state, pendingContinue: true }, updates);
    }

    function saveState(s) {
      writeGames(s.games);
      writeMeta({ currentGameId: s.currentGameId, screen: s.screen });
    }

    // ── Components ───────────────────────────────────────────────────────

    // True iff a 2-player match is mid-flight (past setup, before game-over).
    // Used to decide whether the menu button should confirm before going home.
    function isInProgressMatch(state) {
      const g = getCurrentGame(state);
      return !!g
        && (g.mode === 'l' || g.mode === 'r')
        && g.players[0] !== ''
        && state.screen !== 'game-over';
    }

    // Unified top bar used on every screen except login & home.
    //  - left: Menu (⌂); confirms if a 2P match is in progress
    //  - center: title + optional badge (chip) or meta (plain text)
    //  - right: optional action node (e.g. New Game button on solo game)
    function TopBar({ state, dispatch, title = 'Twordle', badge, meta, right }) {
      const onMenu = () => {
        if (isInProgressMatch(state)) {
          if (!confirm('End the current 2-player match and return to the menu?')) return;
        }
        dispatch({ type: 'GO_HOME' });
      };
      return html`
        <div class="topbar">
          <button class="tb-menu" onClick=${onMenu}>⌂ Menu</button>
          <div class="tb-center">
            <h1>${title}</h1>
            ${badge ? html`<div class="badge">${badge}</div>` : null}
            ${meta ? html`<div class="tb-meta">${meta}</div>` : null}
          </div>
          ${right ? html`<div class="tb-right">${right}</div>` : null}
        </div>
      `;
    }

    function App() {
      const [authed, setAuthed] = useState(() => isAuthed());
      const [state, dispatch] = useReducer(reducer, null, loadInitialState);

      useEffect(() => {
        if (authed) saveState(state);
      }, [state, authed]);

      // Slide the auth TTL forward on each session so active users don't
      // get unexpectedly logged out at the 365-day mark.
      useEffect(() => {
        if (authed) writeAuth();
      }, []);

      // Process incoming share URLs. The hash gets stripped after we read it
      // so a returning user sees their actual local state (active games list
      // etc.) rather than the same old turn re-loading. If the hash *looked*
      // like a share URL but couldn't be decoded, toast so the user knows
      // something went wrong (truncated link, etc.).
      //
      // We don't just run this once on mount: mobile browsers (especially iOS
      // Safari) often focus an existing tab and update location.hash in place
      // when the user taps a link, instead of reloading. We need to react to
      // hashchange so URLs landed in-tab still get parsed. visibilitychange is
      // a safety net for iOS's tab freezing — a backgrounded tab can have its
      // hash updated without firing hashchange until something nudges it.
      useEffect(() => {
        if (!authed) return;
        const tryLoad = () => {
          const h = location.hash || '';
          if (!h.startsWith('#' + URL_PREFIX)) return;
          const incoming = decodeGame(h.slice(1 + URL_PREFIX.length));
          if (incoming) {
            dispatch({ type: 'LOAD_FROM_URL', game: incoming });
          } else {
            toast('This link looks broken — ask your friend for a new one.', 3500);
          }
          clearUrlHash();
        };
        tryLoad();
        const onVisibility = () => { if (!document.hidden) tryLoad(); };
        window.addEventListener('hashchange', tryLoad);
        document.addEventListener('visibilitychange', onVisibility);
        return () => {
          window.removeEventListener('hashchange', tryLoad);
          document.removeEventListener('visibilitychange', onVisibility);
        };
      }, [authed]);

      const onLogout = useCallback(() => {
        clearAuth();
        clearSaves();
        dispatch({ type: 'RESET' });
        setAuthed(false);
      }, []);

      if (!authed) return html`<${Login} onSuccess=${() => setAuthed(true)} />`;

      switch (state.screen) {
        case 'home':              return html`<${Home} state=${state} dispatch=${dispatch} onLogout=${onLogout} />`;
        case 'setup':             return html`<${Setup} state=${state} dispatch=${dispatch} />`;
        case 'mode-chooser':      return html`<${ModeChooser} state=${state} dispatch=${dispatch} />`;
        case 'accept-challenge':  return html`<${AcceptChallenge} state=${state} dispatch=${dispatch} />`;
        case 'word-entry':        return html`<${WordEntry} state=${state} dispatch=${dispatch} />`;
        case 'handoff':           return html`<${Handoff} state=${state} dispatch=${dispatch} />`;
        case 'share':             return html`<${ShareScreen} state=${state} dispatch=${dispatch} />`;
        case 'game':              return html`<${Game} state=${state} dispatch=${dispatch} />`;
        case 'solo-summary':      return html`<${SoloSummary} state=${state} dispatch=${dispatch} />`;
        case 'round-summary':     return html`<${RoundSummary} state=${state} dispatch=${dispatch} />`;
        case 'game-over':         return html`<${GameOver} state=${state} dispatch=${dispatch} />`;
        default:                  return html`<${Home} state=${state} dispatch=${dispatch} onLogout=${onLogout} />`;
      }
    }

    // Small attribution + IP-respect notice shown at the bottom of the
    // login and home screens. Kept text-only so it can scale freely on tiny
    // viewports without competing with the action UI.
    function Disclaimer() {
      return html`
        <div class="disclaimer">
          Inspired by Wordle® by The New York Times Company.
          Twordle is an independent personal project — not affiliated with,
          endorsed by, or sponsored by NYT. Made in the spirit of fair use,
          with respect for the original's intellectual property.
        </div>
      `;
    }

    function Login({ onSuccess }) {
      const [pw, setPw] = useState('');
      const [show, setShow] = useState(false);
      const [err, setErr] = useState('');
      const [busy, setBusy] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const submit = async () => {
        if (busy) return;
        setBusy(true);
        const digest = await sha256(AUTH_SALT + pw);
        if (digest === AUTH_HASH) {
          writeAuth();
          onSuccess();
        } else {
          setErr('Incorrect password.');
          setBusy(false);
          inputRef.current?.select();
        }
      };

      return html`
        <div id="s-login" class="screen">
          <div class="login-body">
            <div class="login-logo">TWORDLE</div>
            <div class="login-sub">Enter the password to play</div>
            <div class="login-eye-wrap">
              <input id="login-input" class="tinput" type=${show ? 'text' : 'password'}
                     placeholder="Password" autocomplete="current-password"
                     ref=${inputRef}
                     value=${pw}
                     onInput=${e => { setPw(e.target.value); setErr(''); }}
                     onKeyDown=${e => { if (e.key === 'Enter') submit(); }} />
              <button id="login-eye" tabindex="-1"
                      onClick=${() => { setShow(s => !s); inputRef.current?.focus(); }}>
                ${show ? '🙈' : '👁'}
              </button>
            </div>
            <div id="login-err">${err}</div>
            <button id="login-btn" class="btn btn-g" onClick=${submit} disabled=${busy}>
              ${busy ? '...' : 'Unlock →'}
            </button>
          </div>
          <${Disclaimer} />
        </div>
      `;
    }

    function Home({ state, dispatch, onLogout }) {
      return html`
        <div id="s-home" class="screen">
          <div class="home-body">
            <div class="logo">TWORDLE</div>
            <div class="sub">Play with a friend — across the room or across the world</div>
            <button class="btn btn-g" onClick=${() => dispatch({ type: 'PICK_TWO_PLAYER' })}>⚔ 2 Player</button>
            <button class="btn btn-o" onClick=${() => dispatch({ type: 'PICK_SOLO' })}>Solo Play</button>
