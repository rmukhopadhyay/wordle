    // Step 2 of the 2P setup flow. Names are already in the placeholder game;
    // here the user decides whether to play on one device or across two.
    function ModeChooser({ state, dispatch }) {
      const g = getCurrentGame(state);
      const opp = g?.players[1] || 'your friend';
      return html`
        <div id="s-mode-chooser" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} title="2 Player" />
          <div class="setup-body">
            <h2>How are you playing?</h2>
            <p class="we-prompt">Pick how you'll exchange turns with <strong>${opp}</strong>.</p>
            <button class="btn btn-g" onClick=${() => dispatch({ type: 'PICK_REMOTE_VARIANT' })}>
              ⚔ Remote
            </button>
            <div class="mc-hint">Different devices. You'll share a link or QR code after each turn.</div>
            <button class="btn btn-o" onClick=${() => dispatch({ type: 'PICK_PASS_AND_PLAY' })}>
              ⚔ Pass & Play
            </button>
            <div class="mc-hint">Same device. You'll hand the phone back and forth.</div>
          </div>
        </div>
      `;
    }

    // Resumeable-game descriptors. A game shows up here if there's some
    // meaningful next-step the user can take with it.
    function describeGame(g) {
      const opp = g.mode === 'r' && g.players ? g.players[1 - (g.myRole ?? 0)] : null;
      if (g.mode === 's') {
        return {
          icon: '🎯', title: 'Solo game',
          status: g.over ? (g.won ? 'Solved' : 'Stumped') : `${g.guesses.length}/${ROWS} guesses`,
          mine: !g.over,
        };
      }
      if (g.mode === 'l') {
        return {
          icon: '⚔', title: `${g.players[0]} vs ${g.players[1]}`,
          status: g.over ? 'Match over'
                 : (g.challengeFor[0].length === 0 || g.challengeFor[1].length === 0) ? 'Setup in progress'
                 : `Round ${g.round + 1} of ${TOTAL_ROUNDS}`,
          mine: !g.over,
        };
      }
      if (g.mode === 'r') {
        const me = g.myRole ?? 0;
        if (g.over) {
          // Sender hasn't shared the final result yet — they're the URL holder.
          if (g.turnFor !== undefined && g.turnFor !== me) {
            return { icon: '🏁', title: `vs ${opp || 'opponent'}`,
                     status: `Send final result to ${opp || 'them'}`, mine: true };
          }
          return { icon: '🏁', title: `vs ${opp || 'opponent'}`, status: 'Match over', mine: false };
        }
        if (g.challengeFor[0].length === 0 && me === 1) {
          return { icon: '⚔', title: `Challenge from ${g.players[0]}`, status: 'Accept the challenge', mine: true };
        }
        if (g.turnFor === me) {
          return { icon: '⚔', title: `vs ${opp || 'opponent'}`,
                   status: `Your turn · Round ${g.round + 1}`, mine: true };
        }
        return { icon: '⚔', title: `vs ${opp || 'opponent'}`,
                 status: `Waiting on ${opp || 'them'}`, mine: false };
      }
      return null;
    }

    function ActiveGames({ state, dispatch }) {
      const list = Object.values(state.games)
        // Hide leftovers: blank solos and 2P placeholders where no words were
        // entered (cleaned up on GO_HOME, but defensive against tab-close).
        .filter(g => {
          if (g.mode === 's' && g.guesses.length === 0 && !g.over) return false;
          if ((g.mode === 'l' || g.mode === 'r')
              && (g.challengeFor[0]?.length ?? 0) === 0
              && (g.challengeFor[1]?.length ?? 0) === 0) return false;
          return true;
        })
        // Most-recently-touched first.
        .sort((a, b) => (b._lastUpdate || 0) - (a._lastUpdate || 0))
        .map(g => ({ g, d: describeGame(g) }))
        .filter(x => x.d);
      if (list.length === 0) return null;
      const onDismiss = (id, label) => {
        if (confirm(`Remove "${label}" from your list?`)) {
          dispatch({ type: 'DISMISS_GAME', gameId: id });
        }
      };
      return html`
        <div class="active-games">
          <div class="ag-label">Active games</div>
          ${list.map(({ g, d }) => html`
            <div class="ag-row" key=${g.id}>
              <button class="ag-resume" onClick=${() => dispatch({ type: 'RESUME_GAME', gameId: g.id })}>
                <div class="ag-icon">${d.icon}</div>
                <div class="ag-text">
                  <div class="ag-title">${d.title}</div>
                  <div class=${`ag-status ${d.mine ? 'mine' : ''}`}>${d.status}</div>
                </div>
              </button>
              <button class="ag-dismiss" onClick=${() => onDismiss(g.id, d.title)} title="Remove">×</button>
            </div>
          `)}
        </div>
      `;
    }

    function Setup({ state, dispatch }) {
      const [p1, setP1] = useState('');
      const [p2, setP2] = useState('');
      const [err, setErr] = useState('');
      const p1Ref = useRef(null);

      useEffect(() => { setTimeout(() => p1Ref.current?.focus(), 250); }, []);

      const submit = () => {
        const a = p1.trim(), b = p2.trim();
        if (!a || !b) return setErr('Enter both names.');
        if (a.toLowerCase() === b.toLowerCase()) return setErr('Players need different names!');
        setErr('');
        dispatch({ type: 'SETUP_DONE', p1: a, p2: b });
      };

      return html`
        <div id="s-setup" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} title="2 Player" />
          <div class="setup-body">
            <h2>Enter player names</h2>
            <div class="field"><label>Player 1</label>
              <input class="tinput" type="text" placeholder="e.g. Alice" maxlength="16"
                     ref=${p1Ref} value=${p1} onInput=${e => setP1(e.target.value)} /></div>
            <div class="field"><label>Player 2</label>
              <input class="tinput" type="text" placeholder="e.g. Bob" maxlength="16"
                     value=${p2} onInput=${e => setP2(e.target.value)}
                     onKeyDown=${e => { if (e.key === 'Enter') submit(); }} /></div>
            <div class="err">${err}</div>
            <button class="btn btn-g" onClick=${submit}>Let's Play!</button>
          </div>
        </div>
      `;
    }

    // Initiator's first turn in a remote match: enter both names and the 3
    // secret words for the opponent in one screen. On submit, the game is
    // created and we transition to the share screen.
    // Opponent's first turn: just received an invite URL. The game already
    // contains the initiator's name + their 3 words for us. We enter our
    // 3 words for them, then transition to share back.
    function AcceptChallenge({ state, dispatch }) {
      const g = getCurrentGame(state);
      const initiator = g?.players[0] || 'Your friend';
      const opponent = g?.players[1] || 'You';
      const [words, setWords] = useState(['', '', '']);
      const [reveal, setReveal] = useState([false, false, false]);
      const [errs, setErrs] = useState(['', '', '']);
      const [globalErr, setGlobalErr] = useState('');
      const refs = [useRef(null), useRef(null), useRef(null)];

      useEffect(() => { setTimeout(() => refs[0].current?.focus(), 250); }, []);

      const setWord = (i, v) => {
        const cleaned = v.replace(/[^a-zA-Z]/g, '');
        setWords(prev => { const w = prev.slice(); w[i] = cleaned; return w; });
        setErrs(prev => { const e = prev.slice(); e[i] = ''; return e; });
        setGlobalErr('');
      };
      const toggleEye = i => setReveal(prev => { const r = prev.slice(); r[i] = !r[i]; return r; });
      const onKey = (e, i) => {
        if (e.key === 'Enter') { if (i < TOTAL_ROUNDS - 1) refs[i+1].current?.focus(); else submit(); }
      };
      const submit = () => {
        let ok = true;
        const newErrs = ['', '', ''];
        const upper = [];
        for (let i = 0; i < TOTAL_ROUNDS; i++) {
          const raw = words[i].trim().toLowerCase();
          if (raw.length !== 5) { newErrs[i] = 'Must be exactly 5 letters.'; ok = false; }
          else if (!ANSWERS_SET.has(raw)) {
            newErrs[i] = `"${raw.toUpperCase()}" isn't valid — try a more common word.`; ok = false;
          } else upper.push(raw.toUpperCase());
        }
        setErrs(newErrs);
        if (!ok) return;
        if (new Set(upper).size < upper.length) return setGlobalErr('Each round needs a different word!');
        dispatch({ type: 'REMOTE_ACCEPT_DONE', words: upper });
      };

      return html`
        <div id="s-accept-challenge" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} badge=${`${initiator}'s challenge`} />
          <div class="we-body">
            <p class="we-prompt" dangerouslySetInnerHTML=${{
              __html: `<strong>${initiator}</strong> challenged <strong>${opponent}</strong> to a Twordle match.<br>Enter 3 secret words for them to guess — one per round.`,
            }}></p>
            <div class="we-fields">
              ${[0,1,2].map(i => html`
                <div class="we-row" key=${i}>
                  <label>Round ${i + 1}</label>
                  <div class="wrap-eye">
                    <input class=${`tinput word-w-input ${reveal[i] ? '' : 'masked'}`} type="text" maxlength="5"
                           placeholder="· · · · ·" autocomplete="off" autocapitalize="characters"
                           autocorrect="off" spellcheck="false"
                           ref=${refs[i]} value=${words[i]}
                           onInput=${e => setWord(i, e.target.value)}
                           onKeyDown=${e => onKey(e, i)} />
                    ${!reveal[i] && words[i] && html`<div class="word-input-mask" aria-hidden="true">${'●'.repeat(words[i].length)}</div>`}
                    <button class="eye-btn" onClick=${() => toggleEye(i)}>${reveal[i] ? '🙈' : '👁'}</button>
                  </div>
                  <div class="we-row-err">${errs[i]}</div>
                </div>
              `)}
            </div>
            <div class="err">${globalErr}</div>
            <button class="btn btn-g" onClick=${submit}>Send Back →</button>
          </div>
        </div>
      `;
    }

    // Replaces the local Handoff screen when it's time to send the URL out.
    // Phase 2: copy-link button only. Phase 3 adds Web Share API + QR.
    function ShareScreen({ state, dispatch }) {
      const g = getCurrentGame(state) ?? emptyGame();
      const [copied, setCopied] = useState(false);
      const [showQr, setShowQr] = useState(false);
      const url = useMemo(() => buildShareUrl(g), [g]);
      const qr = useMemo(() => showQr ? renderQRPath(url) : null, [showQr, url]);
      const recipient = g.players[g.turnFor ?? 1] || 'your opponent';

      // Heading / sub depend on what just happened on this device.
      let heading, sub;
      if (g.over) {
        heading = 'Match over!';
        sub = `Share the final result with <strong>${recipient}</strong> so they can see how it ended.`;
      } else if (g.turnCounter === 1) {
        heading = 'Challenge ready';
        sub = `Send this to <strong>${recipient}</strong> to accept the challenge and play.`;
      } else if (g.turnCounter === 2 && g.guesses.length === 0 && g.round === 0 && g.turn === 0) {
        heading = 'Words locked in';
        sub = `Send this back to <strong>${recipient}</strong> to start Round 1.`;
      } else {
        heading = 'Your turn done';
        sub = `Send this to <strong>${recipient}</strong> so they can take their turn.`;
      }

      const shareText = g.over
        ? `The final result from our Twordle match`
        : (g.turnCounter === 1 ? `I'm challenging you to Twordle!` : `Your turn in Twordle`);

      // Feature-detect Web Share API. Falls back to copy when unavailable
      // (desktop browsers without share support) or when the user cancels.
      const canWebShare = typeof navigator !== 'undefined'
        && typeof navigator.share === 'function'
        && (!navigator.canShare || navigator.canShare({ url, text: shareText }));

      const copy = async () => {
        try { await navigator.clipboard.writeText(url); }
        catch (e) { /* swallow — we'll show success indication anyway */ }
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      };

      const share = async () => {
        try {
          await navigator.share({ url, text: shareText, title: 'Twordle' });
        } catch (e) {
          // User canceled, or the picker failed — silently fall through.
          // No need to surface this; they can hit Copy Link instead.
        }
      };

      return html`
        <div id="s-share" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} badge="Share" />
          <div class="ho-body">
            <div class="ho-icon">📨</div>
            <h2>${heading}</h2>
            <p dangerouslySetInnerHTML=${{ __html: sub }}></p>
            ${showQr && qr && html`
              <div class="qr-box">
                <svg viewBox=${`0 0 ${qr.size} ${qr.size}`} xmlns="http://www.w3.org/2000/svg">
                  <rect width=${qr.size} height=${qr.size} fill="white" />
                  <path d=${qr.d} fill="black" />
                </svg>
              </div>
            `}
            <div class="share-url" onClick=${copy}>${url}</div>
            ${canWebShare && html`
              <button class="btn btn-g" onClick=${share}>Share →</button>
              <button class="btn btn-o" onClick=${copy}>${copied ? 'Copied! ✓' : 'Copy Link'}</button>
            `}
            ${!canWebShare && html`
              <button class="btn btn-g" onClick=${copy}>${copied ? 'Copied! ✓' : 'Copy Link'}</button>
            `}
            <button class="qr-toggle" onClick=${() => setShowQr(s => !s)}>
              ${showQr ? 'Hide QR Code' : 'Show QR Code'}
            </button>
            <button class="btn btn-o" onClick=${() => dispatch({ type: 'GO_HOME' })}>Done</button>
          </div>
        </div>
      `;
    }

    function WordEntry({ state, dispatch }) {
      const g = getCurrentGame(state);
      // New phase semantics: phase = which player is currently setting up.
      //   0 → P1 (initiator), 1 → P2 (opponent).
      // Setter is that player; their words are FOR the OTHER player to guess.
      const phase = g?.wordEntryPhase ?? 0;
      const setterIdx  = phase;
      const guesserIdx = 1 - phase;
      const setter  = g?.players[setterIdx] ?? '';
      const guesser = g?.players[guesserIdx] ?? '';

      const [words, setWords] = useState(['', '', '']);
      const [reveal, setReveal] = useState([false, false, false]);
      const [errs, setErrs] = useState(['', '', '']);
      const [globalErr, setGlobalErr] = useState('');
      const refs = [useRef(null), useRef(null), useRef(null)];

      useEffect(() => { setTimeout(() => refs[0].current?.focus(), 250); }, [phase]);

      const setWord = (i, v) => {
        const cleaned = v.replace(/[^a-zA-Z]/g, '');
        setWords(prev => { const w = prev.slice(); w[i] = cleaned; return w; });
        setErrs(prev => { const e = prev.slice(); e[i] = ''; return e; });
        setGlobalErr('');
      };

      const toggleEye = i => setReveal(prev => { const r = prev.slice(); r[i] = !r[i]; return r; });

      const onKey = (e, i) => {
        if (e.key === 'Enter') {
          if (i < TOTAL_ROUNDS - 1) refs[i + 1].current?.focus();
          else submit();
        }
      };

      const submit = () => {
        let ok = true;
        const newErrs = ['', '', ''];
        const upper = [];
        for (let i = 0; i < TOTAL_ROUNDS; i++) {
          const raw = words[i].trim().toLowerCase();
          if (raw.length !== 5) { newErrs[i] = 'Must be exactly 5 letters.'; ok = false; }
          else if (!ANSWERS_SET.has(raw)) {
            newErrs[i] = `"${raw.toUpperCase()}" isn't valid — try a more common word.`; ok = false;
          } else {
            upper.push(raw.toUpperCase());
          }
        }
        setErrs(newErrs);
        if (!ok) return;
        if (new Set(upper).size < upper.length) {
          setGlobalErr('Each round needs a different word!');
          return;
        }
        dispatch({ type: 'WORD_ENTRY_DONE', words: upper });
      };

      return html`
        <div id="s-word-entry" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} badge=${`${setter}'s words`} />
          <div class="we-body">
            <p class="we-prompt" dangerouslySetInnerHTML=${{
              __html: `<strong>${setter}</strong>, enter 3 secret words for <strong>${guesser}</strong> to solve — one per round:`
            }}></p>
            <div class="we-fields">
              ${[0,1,2].map(i => html`
                <div class="we-row" key=${i}>
                  <label>Round ${i + 1}</label>
                  <div class="wrap-eye">
                    <input class=${`tinput word-w-input ${reveal[i] ? '' : 'masked'}`} type="text" maxlength="5"
                           placeholder="· · · · ·" autocomplete="off" autocapitalize="characters"
                           autocorrect="off" spellcheck="false"
                           ref=${refs[i]} value=${words[i]}
                           onInput=${e => setWord(i, e.target.value)}
                           onKeyDown=${e => onKey(e, i)} />
                    ${!reveal[i] && words[i] && html`<div class="word-input-mask" aria-hidden="true">${'●'.repeat(words[i].length)}</div>`}
                    <button class="eye-btn" onClick=${() => toggleEye(i)}>${reveal[i] ? '🙈' : '👁'}</button>
                  </div>
                  <div class="we-row-err">${errs[i]}</div>
                </div>
              `)}
            </div>
            <div class="err">${globalErr}</div>
            <button class="btn btn-g" onClick=${submit}>Submit Words →</button>
          </div>
        </div>
      `;
    }

    function Handoff({ state, dispatch }) {
      const { badge, icon, title, desc, btnText, next } = state.handoff;
      return html`
        <div id="s-handoff" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} badge=${badge} />
          <div class="ho-body">
            <div class="ho-icon">${icon}</div>
            <h2>${title}</h2>
            <p dangerouslySetInnerHTML=${{ __html: desc }}></p>
            <button class="btn btn-g" onClick=${() => dispatch(next)}>${btnText}</button>
          </div>
        </div>
      `;
    }

    function Game({ state, dispatch }) {
      const { pendingContinue, ui, revealing } = state;
      const game = getCurrentGame(state) ?? emptyGame();
      const { guesses, scores, current, target, over, players } = game;
      const mode = game.mode;
      // Local aliases that preserve readability of the surrounding code:
      const tp = { players, round: game.round, turn: game.turn, results: game.results };

      // Reveal animation: when a new guess is committed, animate the new row.
      // `revealing` (in reducer state) blocks input. Per-tile colors appear
      // at the flip midpoint via `revealedCols` (local UI state).
      const [revealedCols, setRevealedCols] = useState(COLS); // default: all shown (for restored states)
      const [bouncing, setBouncing] = useState(false);
      const [showContinueBtn, setShowContinueBtn] = useState(false);
      const prevGuessCountRef = useRef(guesses.length);
      const continueTimerRef = useRef(null);

      // When a new guess is committed, run the reveal animation and then
      // dispatch REVEAL_DONE (after any win/lose toast delay).
      useEffect(() => {
        if (guesses.length <= prevGuessCountRef.current) {
          prevGuessCountRef.current = guesses.length;
          return;
        }
        prevGuessCountRef.current = guesses.length;
        setRevealedCols(0);

        const FD = 300; // flip duration ms (matches CSS)
        const DL = 300; // per-tile stagger
        const timers = [];
        for (let c = 0; c < COLS; c++) {
          timers.push(setTimeout(() => setRevealedCols(c + 1), c * DL + FD / 2));
        }
        const animMs = (COLS - 1) * DL + FD + 50;
        timers.push(setTimeout(() => {
          const lastScore = scores[scores.length - 1];
          const won = lastScore.every(s => s === 'correct');
          const lost = !won && guesses.length >= ROWS;
          if (won) {
            setBouncing(true);
            timers.push(setTimeout(() => setBouncing(false), 800));
            const lastIdx = guesses.length - 1;
            const msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
            timers.push(setTimeout(() => toast(msgs[Math.min(lastIdx, msgs.length - 1)], 2200), 400));
            if (mode === 's') {
              timers.push(setTimeout(() => dispatch({ type: 'REVEAL_DONE' }), 2400));
            } else {
              dispatch({ type: 'REVEAL_DONE' });
            }
          } else if (lost) {
            timers.push(setTimeout(() => toast(target, 3500), 200));
            if (mode === 's') {
              timers.push(setTimeout(() => dispatch({ type: 'REVEAL_DONE' }), 3600));
            } else {
              dispatch({ type: 'REVEAL_DONE' });
            }
          } else {
            dispatch({ type: 'REVEAL_DONE' });
          }
        }, animMs));
        return () => timers.forEach(clearTimeout);
      }, [guesses.length]);

      // If state was restored mid-reveal, clear the flag immediately so input works.
      useEffect(() => {
        if (revealing && guesses.length === prevGuessCountRef.current) {
          // No new guess landed since mount but reducer says revealing — clear it.
          dispatch({ type: 'REVEAL_DONE' });
        }
      }, []);

      // Continue overlay (2-player): fades in 1.8s after game-over
      useEffect(() => {
        if (mode === 's' || !pendingContinue) {
          setShowContinueBtn(false);
          if (continueTimerRef.current) { clearTimeout(continueTimerRef.current); continueTimerRef.current = null; }
          return;
        }
        continueTimerRef.current = setTimeout(() => setShowContinueBtn(true), 1800);
        return () => {
          if (continueTimerRef.current) { clearTimeout(continueTimerRef.current); continueTimerRef.current = null; }
        };
      }, [mode, pendingContinue]);

      // Error feedback (shake + toast): reducer bumps ui.errorTick when a guess
      // fails validation. Component reacts here.
      const prevErrorTickRef = useRef(ui.errorTick);
      useEffect(() => {
        if (ui.errorTick > prevErrorTickRef.current) {
          prevErrorTickRef.current = ui.errorTick;
          shakeCurrentRow();
          if (ui.errorMsg) toast(ui.errorMsg);
        }
      }, [ui.errorTick]);

      // Keyboard color: derive from all completed guesses (precedence correct > present > absent)
      const keyState = useMemo(() => {
        const map = {};
        const rank = { absent: 1, present: 2, correct: 3 };
        for (let g = 0; g < guesses.length; g++) {
          for (let c = 0; c < COLS; c++) {
            const k = guesses[g][c];
            const s = scores[g][c];
            if (!map[k] || rank[s] > rank[map[k]]) map[k] = s;
          }
        }
        return map;
      }, [guesses, scores]);

      const handleKey = useCallback(k => {
        if (k === '⌫') dispatch({ type: 'DELETE_LETTER' });
        else if (k === 'Enter') dispatch({ type: 'SUBMIT_GUESS' });
        else if (/^[A-Z]$/.test(k)) dispatch({ type: 'TYPE_LETTER', letter: k });
      }, [dispatch]);

      // Physical keyboard
      useEffect(() => {
        const onKey = e => {
          if (e.ctrlKey || e.altKey || e.metaKey) return;
          if (e.key === 'Enter') handleKey('Enter');
          else if (e.key === 'Backspace') handleKey('⌫');
          else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
        };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [handleKey]);

      // Pop animation on the current row's last typed tile
      const [popKey, setPopKey] = useState(0);
      const prevCurLen = useRef(current.length);
      useEffect(() => {
        if (current.length > prevCurLen.current) setPopKey(k => k + 1);
        prevCurLen.current = current.length;
      }, [current]);

      const [shakeRow, setShakeRow] = useState(null);
      const shakeCurrentRow = () => {
        const r = guesses.length;
        setShakeRow(r);
        setTimeout(() => setShakeRow(s => (s === r ? null : s)), 500);
      };

      const meta = (mode === 'l' || mode === 'r')
        ? `Round ${tp.round + 1} of ${TOTAL_ROUNDS} · ${tp.players[tp.turn]}'s turn`
        : '';

      // Render board: 6 rows × 5 cols
      const tiles = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          tiles.push(renderTile(r, c));
        }
      }

      function renderTile(r, c) {
        const isSubmitted = r < guesses.length;
        const isCurrent = r === guesses.length && !over;
        let letter = '';
        let state = '';
        let extraClass = '';
        let style = '';

        if (isSubmitted) {
          letter = guesses[r][c];
          // Show color: if this row is still revealing, only show colored once flip midpoint passed
          const isLastSubmitted = r === guesses.length - 1;
          if (isLastSubmitted && revealing) {
            extraClass = 'flip';
            style = `animation-delay:${c * 300}ms`;
            if (c < revealedCols) state = scores[r][c];
          } else {
            state = scores[r][c];
          }
          if (bouncing && isLastSubmitted) {
            extraClass = (extraClass + ' bnc').trim();
            style = `animation-delay:${c * 100}ms`;
          }
        } else if (isCurrent) {
          letter = current[c] || '';
        }

        const filled = !!letter;
        const popClass = (isCurrent && c === current.length - 1) ? `pop-${popKey}` : '';
        const shakeClass = (r === shakeRow) ? 'row-shake' : '';

        return html`
          <div
            key=${r * COLS + c}
            class=${`tile ${filled ? 'filled' : ''} ${extraClass} ${shakeClass} ${popClass ? 'pop' : ''}`.replace(/\s+/g,' ').trim()}
            data-state=${state || undefined}
            style=${style}
          >${letter}</div>
        `;
      }

      const rightAction = mode === 's'
        ? html`<button class="tb-new-btn" onClick=${() => dispatch({ type: 'NEW_SOLO_GAME' })}>New Game</button>`
        : null;

      return html`
        <div id="s-game" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} title="TWORDLE" meta=${meta || null} right=${rightAction} />
          <div id="game-main">
            <div id="board">${tiles}</div>
            <div id="keyboard">
              ${KEYROWS.map((row, ri) => html`
                <div class="krow" key=${ri}>
                  ${row.map(k => html`
                    <button
                      key=${k}
                      class=${`key ${(k === 'Enter' || k === '⌫') ? 'wide' : ''}`}
                      data-state=${keyState[k] || undefined}
                      onClick=${() => handleKey(k)}>${k}</button>
                  `)}
                </div>
              `)}
            </div>
            ${showContinueBtn && html`
              <div id="cont-overlay">
                <button class="btn btn-g" onClick=${() => dispatch({ type: 'CONTINUE_FROM_TURN' })}>
                  ${tp.turn === 0 ? `Pass to ${tp.players[1]} →` : 'See Round Results →'}
                </button>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function SoloSummary({ state, dispatch }) {
      const g = getCurrentGame(state) ?? emptyGame();
      const won = g.won;
      const word = g.target;
      const guesses = g.guesses.length;
      const sub = won
        ? (guesses === 1 ? 'A hole-in-one. Legendary.'
           : guesses <= 3 ? 'Impressive — well ahead of average.'
           : guesses <= 5 ? 'Solid solve!'
           : 'Got there in the end!')
        : 'Better luck next time — that one was tricky.';
      return html`
        <div id="s-solo-summary" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} />
          <div class="ss-body">
            <div class="ss-icon">${won ? '🎉' : '😔'}</div>
            <h2>${won ? `Solved in ${guesses}!` : 'Stumped!'}</h2>
            <div class=${`ss-word ${won ? '' : 'miss'}`}>${word}</div>
            <p class="ss-sub">${sub}</p>
            <button class="ss-cta" onClick=${() => dispatch({ type: 'PICK_TWO_PLAYER' })}>
              Ready for a real challenge? <strong>⚔ 2 Player</strong>
            </button>
            <div class="ss-actions">
              <button class="btn btn-g" onClick=${() => dispatch({ type: 'NEW_SOLO_GAME' })}>Play Again</button>
              <button class="btn btn-o" onClick=${() => dispatch({ type: 'GO_HOME' })}>← Change Mode</button>
            </div>
          </div>
        </div>
      `;
    }

    function Scoreboard({ players, results, roundsPlayed }) {
      return html`
        <div class="scoreboard">
          <div class="sb-head">
            <span></span>
            ${[0,1,2].map(r => html`<span key=${r}>R${r + 1}</span>`)}
          </div>
          ${[0,1].map(pi => html`
            <div class="sb-row" key=${pi}>
              <span class="sb-name">${players[pi]}</span>
              ${[0,1,2].map(r => {
                const res = r < roundsPlayed ? results[r][pi] : null;
                if (!res) return html`<span class="sb-cell na" key=${r}>—</span>`;
                if (res.solved) return html`<span class="sb-cell ok" key=${r}>${res.guesses}</span>`;
                return html`<span class="sb-cell no" key=${r}>✗</span>`;
              })}
            </div>
          `)}
        </div>
      `;
    }

    function RoundSummary({ state, dispatch }) {
      const g = getCurrentGame(state) ?? emptyGame();
      const tp = { players: g.players, results: g.results };
      // We land here right after the second player finishes the round, so
      // the "just-completed" round is the one currently pointed at by g.round.
      const completedRoundIdx = g.round;
      const next = completedRoundIdx + 2;
      const r0 = tp.results[completedRoundIdx][0];
      const r1 = tp.results[completedRoundIdx][1];
      const t0 = tp.results.slice(0, completedRoundIdx + 1).reduce((s, r) => s + r[0].guesses, 0);
      const t1 = tp.results.slice(0, completedRoundIdx + 1).reduce((s, r) => s + r[1].guesses, 0);
      const verdict = r0.solved && r1.solved
        ? `Both solved it! Heading to Round ${next}...`
        : `Both stumped! No winner yet — Round ${next} is next!`;

      // Action button branches by mode:
      //   local 2P: standard handoff → next player's turn screen
      //   remote, sender (I just played turn=1): "Send to opponent for next round"
      //   remote, receiver (URL just arrived): "Continue to next round" → game
      let action;
      if (g.mode === 'r') {
        const me = g.myRole ?? 0;
        const opp = g.players[1 - me] || 'opponent';
        const isSender = me === g.turn;
        if (isSender) {
          action = html`<button class="btn btn-g"
                                onClick=${() => dispatch({ type: 'GOTO_SHARE' })}>
            Send to ${opp} for Round ${next} →
          </button>`;
        } else {
          action = html`<button class="btn btn-g"
                                onClick=${() => dispatch({ type: 'REMOTE_ADVANCE_NEXT_ROUND' })}>
            Play Round ${next} →
          </button>`;
        }
      } else {
        action = html`<button class="btn btn-g"
                              onClick=${() => dispatch({ type: 'NEXT_ROUND_HANDOFF', nextRound: completedRoundIdx + 1 })}>
          Start Round ${next} →
        </button>`;
      }

      return html`
        <div id="s-round-summary" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} badge=${`After Round ${completedRoundIdx + 1}`} />
          <div class="rs-body">
            <div class="rs-label">Scoreboard</div>
            <${Scoreboard} players=${tp.players} results=${tp.results} roundsPlayed=${completedRoundIdx + 1} />
            <div class="totals-row">
              <span class="tot-item">${tp.players[0]}: <strong>${t0}</strong> guess${t0 !== 1 ? 'es' : ''}</span>
              <span class="tot-item">${tp.players[1]}: <strong>${t1}</strong> guess${t1 !== 1 ? 'es' : ''}</span>
            </div>
            <p class="rs-verdict">${verdict}</p>
            ${action}
          </div>
        </div>
      `;
    }

    function GameOver({ state, dispatch }) {
      const g = getCurrentGame(state) ?? emptyGame();
      const tp = { players: g.players, results: g.results };
      const { type, winnerIdx, roundsPlayed, t0, t1 } = gameOverDetails(g);

      let icon, headlineHtml, subHtml;
      if (type === 'stump') {
        const winner = tp.players[winnerIdx];
        const loser  = tp.players[1 - winnerIdx];
        icon = '🏆';
        headlineHtml = `<span class="go-wname">${winner}</span> wins!`;
        subHtml = `${loser} was stumped in Round ${roundsPlayed} — ${winner} wasn't.`;
      } else if (type === 'guesses') {
        const winner = tp.players[winnerIdx];
        icon = '🏆';
        headlineHtml = `<span class="go-wname">${winner}</span> wins!`;
        subHtml = `All 3 rounds solved! ${tp.players[0]}: ${t0} total guesses · ${tp.players[1]}: ${t1} total guesses`;
      } else {
        icon = '🤝';
        headlineHtml = `It's a Tie!`;
        subHtml = `Both players used ${t0} total guesses across 3 rounds.<br>Time for some trash talk... 😤`;
      }

      // Remote sender = I just played the game-ending move; the encoded URL is
      // pointed at the opponent so they can see the final result. Embed the
      // share affordance right in the game-over screen (more prominent than a
      // separate share screen that can be tapped past without sharing).
      const isRemoteSender = g.mode === 'r'
        && g.myRole !== undefined && g.turnFor !== undefined
        && g.turnFor !== g.myRole;
      const opponent = g.mode === 'r' ? (g.players[1 - (g.myRole ?? 0)] || 'your opponent') : '';

      const [copied, setCopied] = useState(false);
      const [showQr, setShowQr] = useState(false);
      const url = useMemo(() => isRemoteSender ? buildShareUrl(g) : '', [isRemoteSender, g]);
      const qr = useMemo(() => (isRemoteSender && showQr) ? renderQRPath(url) : null,
                         [isRemoteSender, showQr, url]);

      const shareText = `The final result from our Twordle match`;
      const canWebShare = isRemoteSender && typeof navigator !== 'undefined'
        && typeof navigator.share === 'function'
        && (!navigator.canShare || navigator.canShare({ url, text: shareText }));

      const copy = async () => {
        try { await navigator.clipboard.writeText(url); } catch (e) {}
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      };
      const share = async () => {
        try { await navigator.share({ url, text: shareText, title: 'Twordle' }); }
        catch (e) { /* canceled / unsupported — fall through to copy */ }
      };

      return html`
        <div id="s-game-over" class="screen">
          <${TopBar} state=${state} dispatch=${dispatch} />
          <div class="go-body">
            <div class="go-icon">${icon}</div>
            <h2 dangerouslySetInnerHTML=${{ __html: headlineHtml }}></h2>
            <p class="go-sub" dangerouslySetInnerHTML=${{ __html: subHtml }}></p>
            <div class="go-detail">
              <${Scoreboard} players=${tp.players} results=${tp.results} roundsPlayed=${roundsPlayed} />
            </div>
            ${isRemoteSender && html`
              <div class="go-share">
                <p class="go-share-prompt" dangerouslySetInnerHTML=${{
                  __html: `📨 Send the final result to <strong>${opponent}</strong> so they can see how it ended.`
                }}></p>
                ${showQr && qr && html`
                  <div class="qr-box">
                    <svg viewBox=${`0 0 ${qr.size} ${qr.size}`} xmlns="http://www.w3.org/2000/svg">
                      <rect width=${qr.size} height=${qr.size} fill="white" />
                      <path d=${qr.d} fill="black" />
                    </svg>
                  </div>
                `}
                <div class="share-url" onClick=${copy}>${url}</div>
                ${canWebShare && html`<button class="btn btn-g" onClick=${share}>Share →</button>`}
                <button class=${`btn ${canWebShare ? 'btn-o' : 'btn-g'}`} onClick=${copy}>
                  ${copied ? 'Copied! ✓' : 'Copy Link'}
                </button>
                <button class="qr-toggle" onClick=${() => setShowQr(s => !s)}>
                  ${showQr ? 'Hide QR Code' : 'Show QR Code'}
                </button>
              </div>
            `}
            <button class="btn btn-o" onClick=${() => dispatch({ type: 'GO_HOME' })}>
              ${isRemoteSender ? 'Done' : 'Play Again'}
            </button>
          </div>
        </div>
      `;
    }

    render(h(App), document.getElementById('app'));
  </script>
</body>
</html>
