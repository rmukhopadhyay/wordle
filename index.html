<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Twordle</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#121213;--border:#3a3a3c;--correct:#538d4e;--present:#b59f3b;
      --absent:#3a3a3c;--key:#818384;--text:#fff;--muted:#818384;--tile:62px;
    }
    html{overflow:hidden;height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;
         height:100%;overflow:hidden;overscroll-behavior:none;
         display:flex;flex-direction:column;align-items:center;}
    .screen{display:none;width:100%;max-width:500px;flex-direction:column;align-items:center;
            animation:fadeIn .2s ease;}
    .screen.active{display:flex;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* header */
    .ph{width:100%;display:flex;align-items:center;justify-content:center;
        border-bottom:1px solid var(--border);padding:10px 16px;position:relative;flex-shrink:0;}
    .ph h1{font-size:1.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
    .ph .back{position:absolute;left:14px;background:none;border:none;color:var(--muted);
              font-size:1.2rem;cursor:pointer;padding:4px 8px;}
    .ph .back:hover{color:var(--text);}
    .hstack{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .badge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
           background:#1e1e1f;border:1px solid var(--border);padding:3px 10px;border-radius:20px;}

    /* buttons */
    .btn{width:100%;max-width:300px;padding:14px 24px;border-radius:6px;border:none;touch-action:manipulation;
         font-size:.9rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
         cursor:pointer;transition:filter .15s,transform .1s;}
    .btn:active{filter:brightness(.85);transform:scale(.98);}
    .btn-g{background:var(--correct);color:#fff;}
    .btn-o{background:none;border:1px solid var(--border);color:var(--text);}
    .btn-o:hover{border-color:var(--text);}
    .btn-y{background:var(--present);color:#fff;}

    /* inputs */
    .tinput{background:none;border:2px solid var(--border);color:var(--text);
            font-size:1rem;font-weight:600;padding:10px 14px;border-radius:6px;
            outline:none;transition:border-color .15s;width:100%;}
    .tinput:focus{border-color:#818384;}
    .tinput::placeholder{color:#3a3a3c;}
    .err{color:#e57373;font-size:.78rem;letter-spacing:.03em;min-height:18px;}

    /* ── Login ── */
    #s-login{min-height:100vh;justify-content:center;}
    .login-body{flex:1;display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:20px;padding:40px 32px;text-align:center;width:100%;}
    .login-logo{font-size:3rem;font-weight:800;letter-spacing:.15em;margin-bottom:8px;}
    .login-sub{color:var(--muted);font-size:.82rem;letter-spacing:.04em;margin-bottom:8px;}
    .login-eye-wrap{position:relative;width:100%;max-width:300px;}
    #login-input{letter-spacing:.05em;text-align:center;font-size:1rem;padding-right:44px;}
    #login-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);
               background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
    #login-eye:hover{color:var(--text);}
    #logout-btn{background:none;border:none;color:var(--muted);font-size:.75rem;
                letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
                text-decoration:underline;text-underline-offset:3px;margin-top:8px;}
    #logout-btn:hover{color:var(--text);}
    #login-err{color:#e57373;font-size:.8rem;min-height:18px;}
    #login-btn{width:100%;max-width:300px;}

    /* ── Home ── */
    #s-home{min-height:100vh;justify-content:center;}
    .home-body{flex:1;display:flex;flex-direction:column;align-items:center;
               justify-content:center;gap:14px;padding:40px 32px;text-align:center;width:100%;}
    .logo{font-size:3rem;font-weight:800;letter-spacing:.15em;margin-bottom:4px;}
    .sub{color:var(--muted);font-size:.85rem;letter-spacing:.04em;margin-bottom:20px;}

    /* ── Setup ── */
    #s-setup{min-height:100vh;}
    .setup-body{flex:1;display:flex;flex-direction:column;align-items:center;
                justify-content:center;gap:18px;padding:40px 32px;width:100%;}
    .setup-body h2{font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .field{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px;}
    .field label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

    /* ── Word Entry (3 words) ── */
    #s-word-entry{min-height:100vh;}
    .we-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:18px;padding:32px 24px;text-align:center;width:100%;}
    .we-prompt{font-size:.9rem;color:var(--muted);line-height:1.6;}
    .we-prompt strong{color:var(--text);}
    .we-fields{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
    .we-row{display:flex;flex-direction:column;gap:4px;}
    .we-row label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;}
    .wrap-eye{position:relative;}
    .word-w-input{font-size:1.3rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
                  text-align:center;padding:11px 40px 11px 12px;}
    .eye-btn{position:absolute;right:9px;top:50%;transform:translateY(-50%);
             background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;}
    .eye-btn:hover{color:var(--text);}
    .we-row-err{color:#e57373;font-size:.75rem;text-align:left;min-height:16px;}

    /* ── Handoff ── */
    #s-handoff{min-height:100vh;justify-content:center;}
    .ho-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .ho-icon{font-size:3rem;}
    .ho-body h2{font-size:1.4rem;font-weight:700;}
    .ho-body p{color:var(--muted);line-height:1.7;font-size:.9rem;}

    /* ── Game ── */
    #s-game{min-height:100vh;}
    #game-header{width:100%;display:flex;align-items:center;justify-content:center;
                 border-bottom:1px solid var(--border);padding:10px 16px;position:relative;flex-shrink:0;}
    #game-header h1{font-size:1.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
    #game-meta{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    #game-new-btn{position:absolute;right:16px;background:none;border:1px solid var(--border);
                  color:var(--muted);font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;
                  padding:6px 10px;border-radius:4px;cursor:pointer;transition:color .2s,border-color .2s;}
    #game-new-btn:hover{color:var(--text);border-color:var(--text);}
    #game-main{flex:1;display:flex;flex-direction:column;align-items:center;
               justify-content:center;gap:28px;padding:20px 0 10px;position:relative;}
    #cont-overlay{display:none;position:absolute;bottom:68px;left:50%;transform:translateX(-50%);z-index:10;}
    #cont-overlay.on{display:block;}

    /* tiles */
    #board{display:grid;grid-template-rows:repeat(6,var(--tile));grid-template-columns:repeat(5,var(--tile));gap:5px;}
    .tile{width:var(--tile);height:var(--tile);border:2px solid var(--border);display:flex;align-items:center;
          justify-content:center;font-size:2rem;font-weight:700;text-transform:uppercase;
          color:var(--text);background:var(--bg);}
    .tile[data-letter]{border-color:#565758;}
    .tile.pop {animation:pop  .1s ease;}
    .tile.flip{animation:flip .25s ease forwards;}
    .tile.bnc {animation:bnc  .6s ease forwards;}
    .row-shake{animation:shk  .5s ease;}
    @keyframes pop {0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
    @keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
    @keyframes bnc {0%{transform:translateY(0)}40%{transform:translateY(-28px)}65%{transform:translateY(-10px)}80%{transform:translateY(-18px)}90%{transform:translateY(-4px)}100%{transform:translateY(0)}}
    @keyframes shk {0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}}
    .tile[data-state="correct"]{background:var(--correct);border-color:var(--correct);}
    .tile[data-state="present"]{background:var(--present);border-color:var(--present);}
    .tile[data-state="absent"] {background:var(--absent); border-color:var(--absent);}

    /* keyboard */
    #keyboard{display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:20px;}
    .krow{display:flex;gap:6px;}
    .key{height:58px;min-width:43px;padding:0 6px;border-radius:4px;border:none;background:var(--key);touch-action:manipulation;
         color:var(--text);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;
         display:flex;align-items:center;justify-content:center;transition:background .15s;letter-spacing:.03em;}
    .key.wide{min-width:65px;font-size:.75rem;}
    .krow:last-child .key{flex:1;min-width:0;font-size:.8rem;height:46px;}
    .key:active{filter:brightness(.8);}
    .key[data-state="correct"]{background:var(--correct);color:#fff;}
    .key[data-state="present"]{background:var(--present);color:#fff;}
    .key[data-state="absent"] {background:var(--absent); color:#fff;}

    /* ── Round Summary ── */
    #s-round-summary{min-height:100vh;}
    .rs-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:24px;padding:32px 24px;text-align:center;width:100%;}
    .rs-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    .scoreboard{width:100%;max-width:340px;display:flex;flex-direction:column;gap:0;
                border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .sb-head{display:grid;grid-template-columns:1fr repeat(3,52px);background:#1a1a1b;
             padding:8px 14px;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .sb-row {display:grid;grid-template-columns:1fr repeat(3,52px);padding:10px 14px;
             border-top:1px solid var(--border);align-items:center;}
    .sb-name{font-weight:700;font-size:.95rem;text-align:left;}
    .sb-cell{text-align:center;font-size:.85rem;font-weight:600;}
    .sb-cell.ok {color:var(--correct);}
    .sb-cell.no {color:var(--muted);}
    .sb-cell.na {color:#3a3a3c;}
    .totals-row{display:flex;justify-content:center;gap:32px;font-size:.8rem;color:var(--muted);}
    .tot-item strong{color:var(--text);}
    .rs-verdict{font-size:.9rem;color:var(--muted);}

    /* ── Game Over ── */
    #s-game-over{min-height:100vh;justify-content:center;}
    .go-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .go-icon{font-size:3.5rem;}
    .go-body h2{font-size:2rem;font-weight:800;}
    .go-wname{color:var(--correct);}
    .go-sub{color:var(--muted);font-size:.85rem;line-height:1.6;}
    .go-detail{width:100%;max-width:320px;}

    /* ── Solo Summary ── */
    #s-solo-summary{min-height:100vh;justify-content:center;}
    .ss-body{flex:1;display:flex;flex-direction:column;align-items:center;
             justify-content:center;gap:22px;padding:40px 32px;text-align:center;}
    .ss-icon{font-size:3rem;}
    .ss-body h2{font-size:1.8rem;font-weight:800;}
    .ss-word{font-size:2.2rem;font-weight:800;letter-spacing:.3em;color:var(--correct);}
    .ss-word.miss{color:var(--muted);}
    .ss-sub{color:var(--muted);font-size:.9rem;line-height:1.6;}
    .ss-actions{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
    #game-menu-btn{position:absolute;left:14px;background:none;border:none;color:var(--muted);
                   font-size:.8rem;letter-spacing:.05em;cursor:pointer;padding:6px 8px;
                   display:flex;align-items:center;gap:4px;transition:color .2s;}
    #game-menu-btn:hover{color:var(--text);}

    /* ── Toast ── */
    #toasts{position:fixed;top:70px;left:50%;transform:translateX(-50%);
            display:flex;flex-direction:column;align-items:center;gap:8px;z-index:100;pointer-events:none;}
    .toast{background:var(--text);color:var(--bg);padding:10px 18px;border-radius:6px;
           font-weight:700;font-size:.85rem;letter-spacing:.05em;animation:fadeIO 1.6s ease forwards;}
    @keyframes fadeIO{0%{opacity:0;transform:translateY(-6px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0}}

    /* ── Mobile responsive ── */
    @media (max-width: 500px) {
      :root { --tile: clamp(44px, calc((100vw - 52px) / 5), 62px); }

      /* Board: respect new tile var (grid columns auto-pick up --tile) */
      #board { gap: 4px; }

      /* Keyboard: full width, keys flex to fill space */
      #keyboard { padding: 0 2px 16px; width: 100%; box-sizing: border-box; }
      .krow { gap: 5px; width: 100%; }
      .key  { min-width: 0; flex: 1; height: 50px;
              font-size: .72rem; padding: 0 2px; letter-spacing: 0; }
      .key.wide { flex: 1.1; font-size: .6rem; }
      .krow:last-child .key { flex: 1; height: 44px; font-size: .78rem; }

      /* Tighten vertical spacing so everything fits without scrolling */
      #game-main  { gap: 16px; padding-top: 12px; }
      #game-header { padding: 8px 12px; }

      /* Slightly smaller header title on narrow screens */
      #game-header h1, .ph h1 { font-size: 1.4rem; }
      #game-meta { font-size: .55rem; }
    }

    /* Use dynamic viewport height so the browser chrome doesn't cause scroll */
    #s-game { min-height: 100dvh; }
</style>
</head>
<body>

<div id="toasts"></div>

<!-- ── Login ── -->
<div id="s-login" class="screen active">
  <div class="login-body">
    <div class="login-logo">TWORDLE</div>
    <div class="login-sub">Enter the password to play</div>
    <div class="login-eye-wrap">
      <input id="login-input" class="tinput" type="password"
             placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
      <button id="login-eye" onclick="toggleLoginEye()" tabindex="-1">👁</button>
    </div>
    <div id="login-err"></div>
    <button id="login-btn" class="btn btn-g" onclick="doLogin()">Unlock →</button>
  </div>
</div>

<!-- ── Home ── -->
<div id="s-home" class="screen active">
  <div class="home-body">
    <div class="logo">TWORDLE</div>
    <div class="sub">Guess the 5-letter word in 6 tries</div>
    <button id="solo-btn" class="btn btn-g">Solo Play</button>
    <button id="two-btn"  class="btn btn-o">⚔ 2 Player</button>
    <button id="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- ── Setup ── -->
<div id="s-setup" class="screen">
  <div class="ph"><button class="back" id="setup-back">←</button><h1>2 Player</h1></div>
  <div class="setup-body">
    <h2>Enter player names</h2>
    <div class="field"><label>Player 1</label>
      <input id="p1" class="tinput" type="text" placeholder="e.g. Alice" maxlength="16" /></div>
    <div class="field"><label>Player 2</label>
      <input id="p2" class="tinput" type="text" placeholder="e.g. Bob" maxlength="16" /></div>
    <div id="setup-err" class="err"></div>
    <button id="start-btn" class="btn btn-g">Let's Play!</button>
  </div>
</div>

<!-- ── Word Entry (3 words) ── -->
<div id="s-word-entry" class="screen">
  <div class="ph">
    <div class="hstack"><h1>Twordle</h1><div id="we-badge" class="badge">Setup</div></div>
  </div>
  <div class="we-body">
    <p id="we-prompt" class="we-prompt"></p>
    <div class="we-fields" id="we-fields"><!-- built by JS --></div>
    <div id="we-global-err" class="err"></div>
    <button id="submit-words-btn" class="btn btn-g">Submit Words →</button>
  </div>
</div>

<!-- ── Handoff ── -->
<div id="s-handoff" class="screen">
  <div class="ph">
    <div class="hstack"><h1>Twordle</h1><div id="ho-badge" class="badge"></div></div>
  </div>
  <div class="ho-body">
    <div class="ho-icon" id="ho-icon">🔒</div>
    <h2 id="ho-title"></h2>
    <p  id="ho-desc"></p>
    <button id="ho-btn" class="btn btn-g">Start Puzzle</button>
  </div>
</div>

<!-- ── Game ── -->
<div id="s-game" class="screen">
  <div id="game-header">
    <button id="game-menu-btn">⌂ Menu</button>
    <div class="hstack"><h1>TWORDLE</h1><div id="game-meta"></div></div>
    <button id="game-new-btn">New Game</button>
  </div>
  <div id="game-main">
    <div id="board"></div>
    <div id="keyboard"></div>
    <div id="cont-overlay"><button id="cont-btn" class="btn btn-g">Continue →</button></div>
  </div>
</div>

<!-- ── Round Summary ── -->
<div id="s-round-summary" class="screen">
  <div class="ph">
    <div class="hstack"><h1>Twordle</h1><div id="rs-badge" class="badge"></div></div>
  </div>
  <div class="rs-body">
    <div class="rs-label">Scoreboard</div>
    <div class="scoreboard" id="scoreboard"></div>
    <div class="totals-row" id="totals-row"></div>
    <p class="rs-verdict" id="rs-verdict"></p>
    <button id="rs-next-btn" class="btn btn-g">Start Round 2 →</button>
  </div>
</div>

<!-- ── Solo Summary ── -->
<div id="s-solo-summary" class="screen">
  <div class="ph"><h1>Twordle</h1></div>
  <div class="ss-body">
    <div class="ss-icon" id="ss-icon"></div>
    <h2 id="ss-headline"></h2>
    <div id="ss-word" class="ss-word"></div>
    <p  id="ss-sub" class="ss-sub"></p>
    <div class="ss-actions">
      <button id="ss-play-again" class="btn btn-g">Play Again</button>
      <button id="ss-menu"       class="btn btn-o">← Change Mode</button>
    </div>
  </div>
</div>

<!-- ── Game Over ── -->
<div id="s-game-over" class="screen">
  <div class="ph"><h1>Twordle</h1></div>
  <div class="go-body">
    <div class="go-icon" id="go-icon">🏆</div>
    <h2 id="go-headline"></h2>
    <p  id="go-sub" class="go-sub"></p>
    <div class="scoreboard go-detail" id="go-board"></div>
    <button id="play-again-btn" class="btn btn-o">Play Again</button>
  </div>
</div>

    const ANSWERS_SET = new Set(ANSWERS);
    const ALL_VALID   = new Set([...ANSWERS, ...VALID_GUESSES_EXTRA]);
    const TOTAL_ROUNDS = 3;

    // ── Screen ──────────────────────────────────────────────────────────
    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
      // Persist on every screen change (best-effort)
      if (typeof saveState === 'function') try { saveState(); } catch(e) {}
    }

    // ── 2-player state ───────────────────────────────────────────────────
    // challengeFor[guesserIdx][roundIdx] = word (uppercase)
    // results[roundIdx][playerIdx] = { solved:bool, guesses:int } | null
    const tp = {
      players: ['',''],
      challengeFor: [[],[]], 
      results: Array.from({length:TOTAL_ROUNDS}, ()=>[null,null]),
      round: 0,   // 0-indexed current round
      turn: 0,    // 0=player[0] guessing, 1=player[1] guessing
    };

    // ── Home ─────────────────────────────────────────────────────────────
    document.getElementById('solo-btn').onclick = () => {
      mode = 'solo';
      document.getElementById('game-meta').textContent = '';
      document.getElementById('game-new-btn').style.display = '';
      initGame(null); show('s-game');
    };
    document.getElementById('two-btn').onclick   = () => {
      document.getElementById('setup-err').textContent = '';
      show('s-setup');
      setTimeout(()=>document.getElementById('p1').focus(), 250);
    };
    document.getElementById('setup-back').onclick = () => show('s-home');

    // ── Setup ────────────────────────────────────────────────────────────
    document.getElementById('start-btn').onclick = () => {
      const p1 = document.getElementById('p1').value.trim();
      const p2 = document.getElementById('p2').value.trim();
      const err = document.getElementById('setup-err');
      if (!p1||!p2)                            { err.textContent='Enter both names.'; return; }
      if (p1.toLowerCase()===p2.toLowerCase()) { err.textContent='Players need different names!'; return; }
      err.textContent = '';
      tp.players = [p1, p2];
      tp.challengeFor = [[],[]];
      tp.results = Array.from({length:TOTAL_ROUNDS}, ()=>[null,null]);
      tp.round = 0; tp.turn = 0;
      mode = '2player';
      document.getElementById('game-new-btn').style.display = 'none';
      // Phase 0: Player 2 enters words for Player 1 to guess
      showWordEntry(0);
    };

    // ── Word Entry ───────────────────────────────────────────────────────
    // wordEntryPhase 0: p1 (idx 1) sets challenges for p0 (idx 0)
    // wordEntryPhase 1: p0 (idx 0) sets challenges for p1 (idx 1)
    let wordEntryPhase = 0;

    function showWordEntry(phase) {
      wordEntryPhase = phase;
      const setterIdx  = phase === 0 ? 1 : 0;
      const guesserIdx = phase === 0 ? 0 : 1;
      const setter  = tp.players[setterIdx];
      const guesser = tp.players[guesserIdx];

      document.getElementById('we-badge').textContent = phase === 0
        ? `${setter}'s words` : `${setter}'s words`;
      document.getElementById('we-prompt').innerHTML =
        `<strong>${setter}</strong>, enter 3 secret words for <strong>${guesser}</strong> to solve — one per round:`;

      // Build 3 input rows
      const fields = document.getElementById('we-fields');
      fields.innerHTML = '';
      for (let i=0;i<TOTAL_ROUNDS;i++) {
        fields.innerHTML += `
          <div class="we-row">
            <label>Round ${i+1}</label>
            <div class="wrap-eye">
              <input id="wi-${i}" class="tinput word-w-input" type="password" maxlength="5"
                     placeholder="· · · · ·" autocomplete="off" spellcheck="false"
                     oninput="weInput(this)" onkeydown="weKeydown(event,${i})" />
              <button class="eye-btn" onclick="weToggle(${i})">👁</button>
            </div>
            <div id="we-err-${i}" class="we-row-err"></div>
          </div>`;
      }
      document.getElementById('we-global-err').textContent = '';
      show('s-word-entry');
      setTimeout(()=>document.getElementById('wi-0').focus(), 250);
    }

    function weInput(el) {
      el.value = el.value.replace(/[^a-zA-Z]/g,'');
      // clear error for this field
      const idx = el.id.split('-')[1];
      document.getElementById(`we-err-${idx}`).textContent = '';
      document.getElementById('we-global-err').textContent = '';
    }

    function weKeydown(e, idx) {
      if (e.key==='Enter') {
        if (idx < TOTAL_ROUNDS-1) document.getElementById(`wi-${idx+1}`).focus();
        else submitWords();
      }
    }

    function weToggle(i) {
      const inp = document.getElementById(`wi-${i}`);
      const btn = inp.parentElement.querySelector('.eye-btn');
      inp.type = inp.type==='password' ? 'text' : 'password';
      btn.textContent = inp.type==='password' ? '👁' : '🙈';
    }

    document.getElementById('submit-words-btn').onclick = submitWords;

    function submitWords() {
      const guesserIdx = wordEntryPhase === 0 ? 0 : 1;
      let ok = true;
      const words = [];
      for (let i=0;i<TOTAL_ROUNDS;i++) {
        const raw = document.getElementById(`wi-${i}`).value.trim().toLowerCase();
        const errEl = document.getElementById(`we-err-${i}`);
        if (raw.length!==5) {
          errEl.textContent = 'Must be exactly 5 letters.'; ok=false;
        } else if (!ANSWERS_SET.has(raw)) {
          errEl.textContent = `"${raw.toUpperCase()}" isn't valid — try a more common word.`; ok=false;
        } else {
          errEl.textContent = '';
          words.push(raw.toUpperCase());
        }
      }
      if (!ok) return;
      // Check for duplicates
      if (new Set(words).size < words.length) {
        document.getElementById('we-global-err').textContent = 'Each round needs a different word!';
        return;
      }
      tp.challengeFor[guesserIdx] = words;

      if (wordEntryPhase === 0) {
        // Done. Now P0 enters words for P1.
        showHandoff(
          `Round ${tp.players[1]}'s setup`,
          '🔒', 'Words locked in!',
          `Now hand the device to <strong>${tp.players[0]}</strong> to enter their words.`,
          'Enter My Words →',
          () => showWordEntry(1)
        );
      } else {
        // Both players' words are set. Start Round 1 with P0 guessing.
        showHandoff(
          'Round 1 of 3',
          '🎯', `All words set — let's play!`,
          `Hand the device to <strong>${tp.players[0]}</strong> to start Round 1.`,
          'Start Round 1 →',
          () => startTurn(0, 0)
        );
      }
    }

    // ── Handoff (generic) ─────────────────────────────────────────────────
    function showHandoff(badge, icon, title, desc, btnText, onBtn) {
      document.getElementById('ho-badge').textContent  = badge;
      document.getElementById('ho-icon').textContent   = icon;
      document.getElementById('ho-title').textContent  = title;
      document.getElementById('ho-desc').innerHTML     = desc;
      document.getElementById('ho-btn').textContent    = btnText;
      document.getElementById('ho-btn').onclick        = onBtn;
      show('s-handoff');
    }

    // ── Gameplay ──────────────────────────────────────────────────────────
    function startTurn(roundIdx, playerIdx) {
      tp.round = roundIdx;
      tp.turn  = playerIdx;
      const rn = roundIdx + 1;
      const name = tp.players[playerIdx];
      document.getElementById('game-meta').textContent =
        `Round ${rn} of ${TOTAL_ROUNDS} · ${name}'s turn`;
      initGame(tp.challengeFor[playerIdx][roundIdx]);
      show('s-game');
    }

    function onTurnEnd(solved, nguesses) {
      tp.results[tp.round][tp.turn] = { solved, guesses: nguesses };
      const rn   = tp.round + 1;
      const name = tp.players[tp.turn];

      const btn  = document.getElementById('cont-btn');
      if (tp.turn === 0) {
        // Pass to player 1
        btn.textContent = `Pass to ${tp.players[1]} →`;
      } else {
        btn.textContent = 'See Round Results →';
      }
      setTimeout(()=>document.getElementById('cont-overlay').classList.add('on'), 1800);
    }

    document.getElementById('cont-btn').onclick = () => {
      document.getElementById('cont-overlay').classList.remove('on');
      const rn = tp.round + 1;
      if (tp.turn === 0) {
        // Handoff to player 1 for their turn this round
        showHandoff(
          `Round ${rn} of ${TOTAL_ROUNDS}`,
          '🎯', `${tp.players[1]}'s turn`,
          `Hand the device to <strong>${tp.players[1]}</strong>.<br>Press Start when they're ready.`,
          'Start Puzzle',
          () => startTurn(tp.round, 1)
        );
      } else {
        // Both played — evaluate round
        afterRound(tp.round);
      }
    };

    // ── Round evaluation ──────────────────────────────────────────────────
    function afterRound(roundIdx) {
      const r0 = tp.results[roundIdx][0];
      const r1 = tp.results[roundIdx][1];

      // Asymmetric stumping → instant win
      if (r0.solved !== r1.solved) {
        const winnerIdx = r0.solved ? 0 : 1;
        showGameOver('stump', winnerIdx, roundIdx);
        return;
      }

      // Last round → compare totals
      if (roundIdx === TOTAL_ROUNDS - 1) {
        const t0 = tp.results.reduce((s,r)=>s+r[0].guesses, 0);
        const t1 = tp.results.reduce((s,r)=>s+r[1].guesses, 0);
        if (t0 < t1)      showGameOver('guesses', 0, roundIdx, t0, t1);
        else if (t1 < t0) showGameOver('guesses', 1, roundIdx, t0, t1);
        else              showGameOver('tie', -1, roundIdx, t0, t1);
        return;
      }

      // Tie this round — show summary, continue
      showRoundSummary(roundIdx);
    }

    // ── Round Summary ──────────────────────────────────────────────────────
    function showRoundSummary(completedRoundIdx) {
      const next = completedRoundIdx + 2; // next round number (1-indexed)
      document.getElementById('rs-badge').textContent = `After Round ${completedRoundIdx+1}`;
      document.getElementById('rs-next-btn').textContent = `Start Round ${next} →`;
      renderScoreboard('scoreboard', completedRoundIdx + 1);
      renderTotals(completedRoundIdx);

      const r0 = tp.results[completedRoundIdx][0];
      const r1 = tp.results[completedRoundIdx][1];
      document.getElementById('rs-verdict').textContent = r0.solved && r1.solved
        ? 'Both solved it! Heading to Round ' + next + '...'
        : 'Both stumped! No winner yet — Round ' + next + ' is next!';

      document.getElementById('rs-next-btn').onclick = () => {
        const nextRound = completedRoundIdx + 1;
        showHandoff(
          `Round ${nextRound+1} of ${TOTAL_ROUNDS}`,
          '🎯', `Round ${nextRound+1} — ${tp.players[0]}'s turn`,
          `Hand the device to <strong>${tp.players[0]}</strong>.<br>Press Start when they're ready.`,
          `Start Round ${nextRound+1}`,
          () => startTurn(nextRound, 0)
        );
      };
      show('s-round-summary');
    }

    function renderScoreboard(elId, roundsPlayed) {
      const [p0,p1] = tp.players;
      let html = `<div class="sb-head"><span></span>`;
      for (let r=0;r<TOTAL_ROUNDS;r++) html += `<span>R${r+1}</span>`;
      html += `</div>`;
      [0,1].forEach(pi => {
        html += `<div class="sb-row"><span class="sb-name">${tp.players[pi]}</span>`;
        for (let r=0;r<TOTAL_ROUNDS;r++) {
          const res = r < roundsPlayed ? tp.results[r][pi] : null;
          if (!res) { html += `<span class="sb-cell na">—</span>`; }
          else if (res.solved) { html += `<span class="sb-cell ok">${res.guesses}</span>`; }
          else                 { html += `<span class="sb-cell no">✗</span>`; }
        }
        html += `</div>`;
      });
      document.getElementById(elId).innerHTML = html;
    }

    function renderTotals(completedRoundIdx) {
      const t0 = tp.results.slice(0,completedRoundIdx+1).reduce((s,r)=>s+r[0].guesses,0);
      const t1 = tp.results.slice(0,completedRoundIdx+1).reduce((s,r)=>s+r[1].guesses,0);
      document.getElementById('totals-row').innerHTML =
        `<span class="tot-item">${tp.players[0]}: <strong>${t0}</strong> guess${t0!==1?'es':''}</span>` +
        `<span class="tot-item">${tp.players[1]}: <strong>${t1}</strong> guess${t1!==1?'es':''}</span>`;
    }

    // ── Game Over ──────────────────────────────────────────────────────────
    function showGameOver(type, winnerIdx, roundIdx, t0, t1) {
      let icon, headline, sub;
      const roundsPlayed = roundIdx + 1;

      if (type === 'stump') {
        const winner = tp.players[winnerIdx];
        const loser  = tp.players[1-winnerIdx];
        icon      = '🏆';
        headline  = `<span class="go-wname">${winner}</span> wins!`;
        sub       = `${loser} was stumped in Round ${roundsPlayed} — ${winner} wasn't.`;
      } else if (type === 'guesses') {
        const winner = tp.players[winnerIdx];
        icon      = '🏆';
        headline  = `<span class="go-wname">${winner}</span> wins!`;
        sub       = `All 3 rounds solved! ${tp.players[0]}: ${t0} total guesses · ${tp.players[1]}: ${t1} total guesses`;
      } else {
        icon      = '🤝';
        headline  = `It's a Tie!`;
        sub       = `Both players used ${t0} total guesses across 3 rounds.<br>Time for some trash talk... 😤`;
      }

      document.getElementById('go-icon').textContent   = icon;
      document.getElementById('go-headline').innerHTML = headline;
      document.getElementById('go-sub').innerHTML      = sub;
      renderScoreboard('go-board', roundsPlayed);
      show('s-game-over');
    }

    document.getElementById('play-again-btn').onclick = () => show('s-home');

    // ── Solo new game btn ──────────────────────────────────────────────────
    document.getElementById('game-new-btn').onclick = () => initGame(null);

    // ── Menu / home button ─────────────────────────────────────────────────
    document.getElementById('game-menu-btn').onclick = () => {
      if (over || mode === 'solo') {
        // Game already ended, or solo mid-game — just go home
        show('s-home');
      } else {
        // 2-player mid-game — confirm
        if (confirm('End the current 2-player game and return to the menu?')) {
          show('s-home');
        }
      }
    };

    // ── Solo summary screen ────────────────────────────────────────────────
    document.getElementById('ss-play-again').onclick = () => { initGame(null); show('s-game'); };
    document.getElementById('ss-menu').onclick       = () => show('s-home');

    function showSoloSummary(won, word, guesses) {
      document.getElementById('ss-icon').textContent      = won ? '🎉' : '😔';
      document.getElementById('ss-headline').textContent  = won ? `Solved in ${guesses}!` : 'Stumped!';
      const wordEl = document.getElementById('ss-word');
      wordEl.textContent  = word;
      wordEl.className    = 'ss-word' + (won ? '' : ' miss');
      document.getElementById('ss-sub').textContent = won
        ? (guesses === 1 ? 'A hole-in-one. Legendary.' : guesses <= 3 ? 'Impressive — well ahead of average.' : guesses <= 5 ? 'Solid solve!' : 'Got there in the end!')
        : 'Better luck next time — that one was tricky.';
      show('s-solo-summary');
    }

    // ── Wordle engine ──────────────────────────────────────────────────────
    const ROWS=6, COLS=5;
    const KEYROWS=[
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Z','X','C','V','B','N','M'],
      ['Enter','⌫']
    ];
    let mode='solo', target='', row=0, col=0, guess=[], over=false, revealing=false, nguesses=0;
    let tileEls=[], keyEls={};

    function initGame(word) {
      target = word || ANSWERS[Math.floor(Math.random()*ANSWERS.length)].toUpperCase();
      [row,col,guess,over,revealing,nguesses]=[0,0,[],false,false,0];
      buildBoard(); buildKeyboard();
    }

    function buildBoard() {
      const b=document.getElementById('board'); b.innerHTML=''; tileEls=[];
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const t=document.createElement('div'); t.className='tile'; b.appendChild(t); tileEls.push(t);
      }
    }

    function buildKeyboard() {
      const kb=document.getElementById('keyboard'); kb.innerHTML=''; keyEls={};
      KEYROWS.forEach(kr=>{
        const rd=document.createElement('div'); rd.className='krow';
        kr.forEach(k=>{
          const b=document.createElement('button'); b.className='key'; b.textContent=k; b.dataset.key=k;
          if(k==='Enter'||k==='⌫') b.classList.add('wide');
          b.addEventListener('click',()=>handleKey(k));
          rd.appendChild(b); keyEls[k]=b;
        });
        kb.appendChild(rd);
      });
    }

    document.addEventListener('keydown', e=>{
      if(!document.getElementById('s-game').classList.contains('active')) return;
      if(e.ctrlKey||e.altKey||e.metaKey) return;
      if(e.key==='Enter') handleKey('Enter');
      else if(e.key==='Backspace') handleKey('⌫');
      else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
    });

    function handleKey(k){
      if(over||revealing) return;
      if(k==='⌫') del(); else if(k==='Enter') submit(); else if(/^[A-Z]$/.test(k)) add(k);
    }

    function tile(r,c){return tileEls[r*COLS+c];}

    function add(l){
      if(col>=COLS) return;
      const t=tile(row,col); t.textContent=l; t.dataset.letter=l;
      t.classList.remove('pop'); void t.offsetWidth; t.classList.add('pop');
      guess.push(l); col++; saveState();
    }

    function del(){
      if(!col) return; col--; guess.pop();
      const t=tile(row,col); t.textContent=''; delete t.dataset.letter; saveState();
    }

    function submit(){
      if(col<COLS){shakeRow(row); toast('Not enough letters'); return;}
      const w=guess.join('').toLowerCase();
      if(!ALL_VALID.has(w)){shakeRow(row); toast('Not in word list'); return;}
      nguesses++;
      const res=score(guess.join(''));
      revealRow(row,res,guess.join(''));
    }

    function score(g){
      const res=Array(COLS).fill('absent'), tgt=target.split(''), ga=g.split('');
      for(let i=0;i<COLS;i++) if(ga[i]===tgt[i]){res[i]='correct';tgt[i]=null;ga[i]=null;}
      for(let i=0;i<COLS;i++){
        if(!ga[i]) continue;
        const x=tgt.indexOf(ga[i]); if(x!==-1){res[i]='present';tgt[x]=null;}
      }
      return res;
    }

    function revealRow(r,res,g){
      revealing=true;
      const FD=300,DL=300;
      for(let c=0;c<COLS;c++){
        const t=tile(r,c),s=res[c];
        setTimeout(()=>{
          t.classList.add('flip');
          setTimeout(()=>{
            t.dataset.state=s; t.classList.remove('flip');
            const k=keyEls[g[c]]; if(k){
              const cur=k.dataset.state;
              if(!cur||cur==='absent'||(cur==='present'&&s==='correct')) k.dataset.state=s;
            }
          },FD/2);
        },c*DL);
      }
      setTimeout(()=>{
        revealing=false;
        const won=res.every(x=>x==='correct');
        if(won){
          bounce(r);
          const msgs=['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
          setTimeout(()=>toast(msgs[Math.min(r,msgs.length-1)],2200),400);
          over=true;
          if(mode==='2player') onTurnEnd(true, nguesses);
          else setTimeout(()=>showSoloSummary(true, target, nguesses), 2400);
        } else {
          row++; col=0; guess=[];
          if(row>=ROWS){
            setTimeout(()=>toast(target,3500),200);
            over=true;
            if(mode==='2player') onTurnEnd(false, nguesses);
            else setTimeout(()=>showSoloSummary(false, target, nguesses), 3600);
          }
        }
        saveState(); // save after reveal: tile colors + row state fully updated
      },(COLS-1)*DL+FD+50);
    }

    function shakeRow(r){
      const tiles=Array.from({length:COLS},(_,c)=>tile(r,c));
      tiles.forEach(t=>{t.classList.remove('row-shake');void t.offsetWidth;t.classList.add('row-shake');});
      setTimeout(()=>tiles.forEach(t=>t.classList.remove('row-shake')),500);
    }

    function bounce(r){
      for(let c=0;c<COLS;c++){
        const t=tile(r,c);
        setTimeout(()=>{t.classList.add('bnc');setTimeout(()=>t.classList.remove('bnc'),700);},c*100);
      }
    }

    function toast(msg,dur=1600){
      const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
      el.style.animationDuration=dur+'ms';
      document.getElementById('toasts').appendChild(el);
      setTimeout(()=>el.remove(),dur);
    }


    // ── Game state persistence (sessionStorage = tab-scoped, survives reload) ──
    const SAVE_KEY = '_tw_save';

    function saveState() {
      try {
        const tileStates = tileEls.map(t => ({
          text: t.textContent, letter: t.dataset.letter||'', state: t.dataset.state||''
        }));
        const keyStates = {};
        Object.entries(keyEls).forEach(([k,el]) => { if (el.dataset.state) keyStates[k] = el.dataset.state; });
        sessionStorage.setItem(SAVE_KEY, JSON.stringify({
          screen: document.querySelector('.screen.active')?.id || 's-home',
          mode, target, row, col, guess, over, nguesses,
          tileStates, keyStates,
          tp: JSON.parse(JSON.stringify(tp))
        }));
      } catch(e) {}
    }

    function restoreState() {
      try {
        const raw = sessionStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);

        // Screens we can't meaningfully restore — fall back to home
        const fallback = ['s-setup','s-word-entry','s-handoff'];
        const screen = fallback.includes(s.screen) ? 's-home' : s.screen;

        mode = s.mode || 'solo';
        if (s.tp) Object.assign(tp, s.tp);
        target = s.target || ''; row = s.row||0; col = s.col||0;
        guess = s.guess||[]; over = s.over||false; nguesses = s.nguesses||0;

        if (['s-game','s-solo-summary'].includes(screen) && s.tileStates?.length) {
          buildBoard(); buildKeyboard();
          s.tileStates.forEach((ts,i) => {
            if (ts.text)   tileEls[i].textContent    = ts.text;
            if (ts.letter) tileEls[i].dataset.letter  = ts.letter;
            if (ts.state)  tileEls[i].dataset.state   = ts.state;
          });
          Object.entries(s.keyStates||{}).forEach(([k,st]) => {
            if (keyEls[k]) keyEls[k].dataset.state = st;
          });
        }

        if (screen === 's-game') {
          if (mode === '2player') {
            const rn = (tp.round||0)+1;
            document.getElementById('game-meta').textContent =
              `Round ${rn} of ${TOTAL_ROUNDS} · ${tp.players[tp.turn]}'s turn`;
            document.getElementById('game-new-btn').style.display = 'none';
          }
          if (over) {
            // Show continue overlay so they can proceed
            document.getElementById('cont-overlay').classList.add('on');
          }
        }

        if (screen === 's-round-summary') { renderScoreboard('scoreboard', tp.round+1); renderTotals(tp.round); document.getElementById('rs-next-btn').textContent = `Start Round ${tp.round+2} →`; }
        if (screen === 's-game-over')     renderScoreboard('go-board', tp.round+1);

        show(screen);
        return true;
      } catch(e) { sessionStorage.removeItem(SAVE_KEY); return false; }
    }

    // ── Auth ────────────────────────────────────────────────────────────
    const AUTH_SALT   = '2887189806cd0b6d11cfb3dab14548c1933e1205f23456f6bafeea6b52e5dbc0';
    const AUTH_HASH   = '4f904ad3005a678ac1e97226fd02666c89a23c42bb7d5c97259eff1afb5cf1a3';
    const COOKIE_NAME = '_wpa';

    function getAuth(key)       { return localStorage.getItem(key); }
    function setAuth(key, value) { localStorage.setItem(key, value); }
    function clearAuth(key)      { localStorage.removeItem(key); }

    async function sha256(str) {
      const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }

    function toggleLoginEye() {
      const inp = document.getElementById('login-input');
      const btn = document.getElementById('login-eye');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
      inp.focus();
    }

    function doLogout() {
      clearAuth(COOKIE_NAME);
      sessionStorage.removeItem(SAVE_KEY);
      show('s-login');
      document.getElementById('login-input').value = '';
      document.getElementById('login-input').type  = 'password';
      document.getElementById('login-eye').textContent = '👁';
      document.getElementById('login-err').textContent = '';
      setTimeout(()=>document.getElementById('login-input').focus(), 250);
    }

    async function doLogin() {
      const pw  = document.getElementById('login-input').value;
      const err = document.getElementById('login-err');
      const btn = document.getElementById('login-btn');
      btn.textContent = '...';
      const digest = await sha256(AUTH_SALT + pw);
      if (digest === AUTH_HASH) {
        setAuth(COOKIE_NAME, AUTH_HASH);
        show('s-home');
      } else {
        err.textContent  = 'Incorrect password.';
        btn.textContent  = 'Unlock →';
        document.getElementById('login-input').select();
      }
    }

    // Boot
    if (getAuth(COOKIE_NAME) === AUTH_HASH) {
      if (!restoreState()) show('s-home');
    } else {
      show('s-login');
      setTimeout(()=>document.getElementById('login-input').focus(), 250);
    }

</script>
